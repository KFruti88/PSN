<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FS22 Master Tracker</title>
    
    <!-- PWA / Desktop App Capabilities -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root {
            /* Personalized Divi Settings */
            --divi-section-height: 50px;
            --divi-row-height: 30px;
            --divi-body-size: 14px;
            --divi-header-size: 30px;

            --jd-green: #367c2b;
            --jd-yellow: #ffde00;
            --fs22-op-color: #ff8c00; 
            --fs22-hw-color: #367c2b;
            --glass-sheen: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0.05) 40%, rgba(255,255,255,0) 50%, rgba(255,255,255,0.05) 60%, rgba(255,255,255,0.1) 100%);
        }

        body, html {
            margin: 0; padding: 0;
            background: #000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
        }

        #wp-custom-wrapper {
            width: 100%;
            max-width: 1600px;
            margin: 0 auto;
            color: #f1f5f9;
            font-family: ui-sans-serif, system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: env(safe-area-inset-top) 1rem env(safe-area-inset-bottom) 1rem;
            box-sizing: border-box;
        }

        .fs22-main-shell {
            width: 100%;
            margin-top: 2vh;
            border-radius: 2.5rem;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: url('https://encrypted-tbn3.gstatic.com/images?q=tbn:ANd9GcSsAtz--LSRgueGUzqjPk3A4Ry4PY5uhKyIxBH24w451dGUaFMr') no-repeat center center fixed;
            background-size: cover;
            box-shadow: 0 50px 100px -20px rgba(0, 0, 0, 0.8);
            z-index: 2;
            padding: 2rem;
        }

        .fs22-main-shell::before {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(180deg, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.95) 100%);
            z-index: 1;
        }

        .fs-heavy-glass {
            background: rgba(10, 12, 14, 0.85);
            backdrop-filter: blur(30px) saturate(150%);
            -webkit-backdrop-filter: blur(30px) saturate(150%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2rem;
            position: relative;
            z-index: 10;
        }

        .jd-yellow-text { color: var(--jd-yellow) !important; }
        .hw-accent-text { color: var(--fs22-hw-color) !important; text-shadow: 0 0 15px var(--fs22-hw-color); }

        .category-header { 
            display: flex; justify-content: space-between; align-items: center; 
            cursor: pointer; border-left: 10px solid var(--fs22-op-color); 
            padding: 1.25rem 1.75rem; background: rgba(15, 23, 42, 0.95);
            border-radius: 1rem; margin-bottom: 0.75rem;
            position: relative; z-index: 20;
            transition: all 0.3s;
        }

        .category-header:hover { background: rgba(30, 41, 59, 0.95); }
        .section-collapsed .section-content { display: none; }
        .category-arrow { transition: transform 0.3s ease; }
        .section-collapsed .category-arrow { transform: rotate(-90deg); }

        .fs-card-glass {
            background: rgba(15, 18, 20, 0.9);
            backdrop-filter: blur(15px);
            border: 1.5px solid rgba(255, 255, 255, 0.08);
            border-radius: 1.5rem;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .fs-card-glass::after {
            content: ''; position: absolute; inset: 0;
            background: var(--glass-sheen); pointer-events: none;
        }

        .fs-card-glass.earned {
            border-color: #22c55e !important;
            box-shadow: 0 0 30px -5px rgba(34, 197, 94, 0.4);
        }

        .helper-note {
            background: rgba(255, 222, 0, 0.1);
            border-left: 2px solid var(--jd-yellow);
            padding: 10px; margin-top: 12px;
            border-radius: 8px; font-size: 11px;
            font-weight: 500; line-height: 1.4; color: var(--jd-yellow);
            text-shadow: 0 0 5px rgba(255, 222, 0, 0.3);
        }

        .op-btn-active {
            box-shadow: 0 0 25px var(--fs22-op-color);
            border-color: var(--fs22-op-color) !important;
            transform: scale(1.05);
        }

        @media (max-width: 640px) {
            .fs22-main-shell { border-radius: 1.5rem; margin-top: 0; padding: 1rem; }
            /* Force stacking and center items for clean mobile look */
            .mobile-stack { flex-direction: column !important; }
        }
    </style>
</head>
<body>

<div id="wp-custom-wrapper">
    <div id="fs22-app-container" class="fs22-main-shell">
        
        <!-- Desktop Grid Headers (Stacks on Mobile) -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 relative z-[100] mt-4 mb-8">
            <div class="fs-heavy-glass p-6 flex flex-col items-center justify-center">
                <span class="text-[9px] font-black uppercase tracking-[0.4em] jd-yellow-text mb-4">Operator Sync</span>
                <div id="fs22-user-selector" class="flex flex-wrap justify-center gap-3"></div>
            </div>
            <div class="fs-heavy-glass p-6 flex flex-col items-center justify-center">
                <span class="text-[9px] font-black uppercase tracking-[0.4em] jd-yellow-text mb-4">Hardware Profile</span>
                <div class="flex gap-3">
                    <button id="btn-PS5" data-action="platform" data-platform="PS5" class="px-8 py-2 rounded-xl border-2 font-black text-[10px] uppercase tracking-widest transition-all">PS5</button>
                    <button id="btn-PS4" data-action="platform" data-platform="PS4" class="px-8 py-2 rounded-xl border-2 font-black text-[10px] uppercase tracking-widest transition-all">PS4</button>
                </div>
            </div>
        </div>

        <!-- Global Progress Header -->
        <div id="fs22-platinum-root" class="relative z-10 mb-8"></div>

        <!-- Sections Container -->
        <div id="fs22-section-container" class="relative z-10 flex flex-col gap-4"></div>

        <footer class="mt-20 text-center border-t border-white/5 pt-8 pb-4 text-[9px] jd-yellow-text uppercase tracking-[0.5em] font-black">
            FS22 Ultimate Protocol • Lead: Werewolf3788
        </footer>
    </div>
</div>

<script type="module">
import { initializeApp, getApps } from 'https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js';
import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js';
import { getFirestore, doc, setDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js';

const firebaseConfig = {
    apiKey: "AIzaSyC55Cb3JcK9NiDkdSHpAS3UuTEG82aze7k",
    authDomain: "angler-squad-tracker.firebaseapp.com",
    projectId: "angler-squad-tracker",
    storageBucket: "angler-squad-tracker.firebasestorage.app",
    messagingSenderId: "325679067980",
    appId: "1:325679067980:web:57edbad70fe12b988355e9"
};

const app = getApps().length === 0 ? initializeApp(firebaseConfig) : getApps()[0];
const auth = getAuth(app);
const db = getFirestore(app);

const APP_ID = 'fs22-master';
const SQUAD = [
    { id: 'Werewolf3788', label: 'Werewolf', theme: '#ff8c00', img: 'https://static-cdn.jtvnw.net/jtv_user_pictures/1a4efdb4-023e-4802-b07c-82c09a45c4c8-profile_image-70x70.png' },
    { id: 'Raymystyro', label: 'Ray', theme: '#c00000', img: 'https://static-cdn.jtvnw.net/jtv_user_pictures/032a0367-589f-4763-94de-4fc679a0b2df-profile_image-70x70.png' },
    { id: 'terrdog420', label: 'TJ', theme: '#004a99', img: 'https://static-cdn.jtvnw.net/jtv_user_pictures/9dad426e-04cb-4fc0-a917-25982b3800ce-profile_image-70x70.png' }
];

const MANIFEST = [
    { id: "fluffiness", title: "Fluffiness", goal: 30, isInc: true, rarity: "Very Rare", cat: "Animals" },
    { id: "piggies", title: "Three little piggies…", goal: 50, isInc: true, rarity: "Very Rare", cat: "Animals" },
    { id: "clucky_streak", title: "Clucky Streak", goal: 100, isInc: true, rarity: "Very Rare", cat: "Animals" },
    { id: "honey", title: "Bringing in the Honey", goal: 15, isInc: true, rarity: "Very Rare", cat: "Animals" },
    { id: "cowherd", title: "Cowherd", goal: 20, isInc: true, rarity: "Very Rare", cat: "Animals" },
    { id: "kangaroo", title: "You are not a kangaroo", goal: 1, rarity: "Very Rare", cat: "Animals" },
    { id: "giddy_up", title: "Giddy-up!", goal: 1, rarity: "Very Rare", cat: "Animals" },
    { id: "ultimutt", title: "Ultimutt Pawesomeness", goal: 1, rarity: "Rare", cat: "Animals" },
    { id: "colourful", title: "Pretty colourful", goal: 100, isInc: true, rarity: "Very Rare", cat: "Toys & Collectibles" },
    { id: "game_on", title: "Game on", goal: 20, isInc: true, rarity: "Very Rare", cat: "Toys & Collectibles" },
    { id: "cheese_it", title: "Cheese it", goal: 12, isInc: true, rarity: "Very Rare", cat: "Toys & Collectibles" },
    { id: "vehicle_fleet", title: "Vehicle fleet", goal: 60, isInc: true, rarity: "Rare", cat: "Farm Equipment" },
    { id: "fix_me_up", title: "Fix me up", goal: 25, isInc: true, rarity: "Very Rare", cat: "Farm Equipment" },
    { id: "switch_it_up", title: "I like to switch it up", goal: 30, isInc: true, rarity: "Rare", cat: "Farm Equipment" },
    { id: "weekend_vehicle", title: "Weekend vehicle", goal: 45, isInc: true, rarity: "Rare", cat: "Farm Equipment" },
    { id: "beginning", title: "It's just the beginning", goal: 10, isInc: true, rarity: "Rare", cat: "Farm Equipment" },
    { id: "fell_off", title: "It just fell off", goal: 1, rarity: "Rare", cat: "Farm Equipment" },
    { id: "road_trip", title: "Road Trip", goal: 100, isInc: true, rarity: "Silver", cat: "Farming Operations" },
    { id: "helper_a", title: "Helper A", goal: 50, isInc: true, rarity: "Very Rare", customNote: "Complete 50 missions in one savegame. Progress resumes once previous save record is broken.", cat: "Farming Operations" },
    { id: "plot_thickens", title: "The plot thickens", goal: 100, isInc: true, rarity: "Very Rare", cat: "Farming Operations" },
    { id: "long_haul", title: "Long haul", goal: 50, isInc: true, rarity: "Very Rare", cat: "Farming Operations" },
    { id: "thoroughbred", title: "Thoroughbred!", goal: 100, isInc: true, rarity: "Very Rare", cat: "Farming Operations" },
    { id: "original_grain", title: "Original grain", goal: 50, isInc: true, rarity: "Very Rare", cat: "Farming Operations" },
    { id: "sow_easy", title: "It's sow easy", goal: 100, isInc: true, rarity: "Very Rare", cat: "Farming Operations" },
    { id: "large_scale", title: "Large-scale supplier", goal: 100, isInc: true, rarity: "Very Rare", cat: "Farming Operations" },
    { id: "field_trip", title: "Field Trip", goal: 150, isInc: true, rarity: "Rare", cat: "Farming Operations" },
    { id: "cultivated", title: "Highly cultivated", goal: 100, isInc: true, rarity: "Very Rare", cat: "Farming Operations" },
    { id: "wrap", title: "That's a wrap", goal: 40, isInc: true, rarity: "Very Rare", cat: "Farming Operations" },
    { id: "cotton", title: "Gone but not for cotton", goal: 40, isInc: true, rarity: "Very Rare", cat: "Farming Operations" },
    { id: "raisin", title: "Raisin the stakes", goal: 8, isInc: true, rarity: "Very Rare", cat: "Farming Operations" },
    { id: "olea", title: "Olea europaea", goal: 6, isInc: true, rarity: "Very Rare", cat: "Farming Operations" },
    { id: "stumped", title: "I'm stumped", goal: 25, isInc: true, rarity: "Rare", cat: "Farming Operations" },
    { id: "oiled", title: "Well-Oiled Machine", goal: 10, isInc: true, rarity: "Very Rare", cat: "Farming Operations" },
    { id: "plant_enough", title: "Plant get enough", goal: 1, rarity: "Bronze", cat: "Farming Operations" },
    { id: "allez_hopp", title: "Allez hopp", goal: 1, rarity: "Bronze", cat: "Farming Operations" },
    { id: "help_me", title: "Help me to help you", goal: 1, rarity: "Uncommon", cat: "Farming Operations" },
    { id: "sprinkle", title: "Just a sprinkle", goal: 1, rarity: "Uncommon", cat: "Farming Operations" },
    { id: "own_use", title: "Own use", goal: 1, rarity: "Uncommon", cat: "Farming Operations" },
    { id: "van_gogh", title: "van Gogh", goal: 1, rarity: "Rare", cat: "Farming Operations" },
    { id: "shakespeare", title: "I read Shakespeare", goal: 1, rarity: "Uncommon", cat: "Farming Operations" },
    { id: "rock_on", title: "Rock on", goal: 1, rarity: "Very Rare", cat: "Farming Operations" },
    { id: "wood_not", title: "You wood not believe it", goal: 1, rarity: "Uncommon", cat: "Farming Operations" },
    { id: "hard_work", title: "Hard work pays off", goal: 1, rarity: "Rare", cat: "Farming Operations" },
    { id: "out_of_land", title: "All out of Land", goal: 1, rarity: "Rare", cat: "Farming Operations" },
    { id: "never_late", title: "It's never too late to farm", goal: 1, rarity: "Rare", cat: "Farming Operations" }
];

let state = {
    currentSel: SQUAD[0],
    currentPlatform: 'PS5',
    userData: {},
    unsubscribe: null,
    collapsed: {} // Categories will be initialized as collapsed
};

async function init() {
    await signInAnonymously(auth);
    onAuthStateChanged(auth, (user) => { if (user) { sync(); listen(); } });
}

function sync() {
    if (state.unsubscribe) state.unsubscribe();
    const ref = doc(db, 'artifacts', APP_ID, 'public', 'data', 'userTrophies', state.currentSel.id);
    state.unsubscribe = onSnapshot(ref, (snap) => {
        state.userData = snap.exists() ? snap.data() : {};
        render();
    });
}

function listen() {
    document.addEventListener('click', async (e) => {
        const btn = e.target.closest('[data-action]');
        if (!btn) return;
        
        const action = btn.getAttribute('data-action');
        if (action === 'switch') {
            state.currentSel = SQUAD.find(u => u.id === btn.getAttribute('data-user'));
            sync();
        }
        if (action === 'platform') {
            state.currentPlatform = btn.getAttribute('data-platform');
            sync();
        }
        if (action === 'trophy') {
            const tid = btn.getAttribute('data-id');
            const delta = parseInt(btn.getAttribute('data-delta'));
            const t = MANIFEST.find(m => m.id === tid);
            const pData = state.userData[state.currentPlatform] || {};
            const cur = pData[tid] || { count: 0, isEarned: false };
            let count = t.isInc ? Math.max(0, Math.min(t.goal, (cur.count || 0) + delta)) : (cur.isEarned ? 0 : 1);
            
            const ref = doc(db, 'artifacts', APP_ID, 'public', 'data', 'userTrophies', state.currentSel.id);
            const up = {}; up[`${state.currentPlatform}.${tid}`] = { count: count, isEarned: count >= t.goal };
            await setDoc(ref, up, { merge: true });
        }
        if (action === 'toggle-sec') {
            const sid = btn.getAttribute('data-sid');
            state.collapsed[sid] = !state.collapsed[sid];
            render();
        }
    });
}

function render() {
    const root = document.getElementById('fs22-app-container');
    root.style.setProperty('--fs22-op-color', state.currentSel.theme);
    root.style.setProperty('--fs22-hw-color', state.currentPlatform === 'PS5' ? '#367c2b' : '#ffde00');

    // Operator Selector
    document.getElementById('fs22-user-selector').innerHTML = SQUAD.map(u => `
        <button data-action="switch" data-user="${u.id}" class="flex items-center gap-2 p-1.5 pr-4 rounded-full border-2 transition-all ${state.currentSel.id === u.id ? 'op-btn-active' : ''}"
            style="border-color: ${state.currentSel.id === u.id ? u.theme : 'transparent'}; background: rgba(0,0,0,0.6)">
            <img src="${u.img}" class="w-8 h-8 rounded-full border border-white/10" />
            <span class="text-[10px] font-black uppercase text-white">${u.label}</span>
        </button>
    `).join('');

    // Platform Profile
    ['PS5', 'PS4'].forEach(p => {
        const btn = document.getElementById(`btn-${p}`);
        const active = state.currentPlatform === p;
        btn.className = `px-8 py-2 rounded-xl border-2 font-black text-[10px] uppercase transition-all ${active ? 'op-btn-active' : 'opacity-40'}`;
        btn.style.borderColor = active ? 'var(--fs22-hw-color)' : 'white';
    });

    const pData = state.userData[state.currentPlatform] || {};
    const earned = MANIFEST.filter(m => pData[m.id]?.isEarned).length;
    const total = MANIFEST.length;
    const pct = Math.floor((earned / total) * 100);

    // Global Header
    document.getElementById('fs22-platinum-root').innerHTML = `
        <div class="fs-heavy-glass p-8 md:p-12 flex flex-col md:flex-row gap-8 items-center border-t-4" style="border-top-color: var(--fs22-op-color)">
            <div class="flex-1 text-center md:text-left">
                <span class="jd-yellow-text text-[10px] uppercase font-black tracking-widest">${state.currentSel.label}'s Progress</span>
                <h2 class="text-3xl md:text-5xl font-black italic text-white uppercase leading-none">REGISTRY: ${earned}/${total}</h2>
            </div>
            <div class="flex flex-col items-center">
                <span class="text-6xl md:text-7xl font-black italic hw-accent-text">${pct}%</span>
                <span class="text-[8px] font-black uppercase tracking-[0.8em] jd-yellow-text mt-1">Synchronization</span>
            </div>
        </div>
    `;

    // Sections
    const container = document.getElementById('fs22-section-container');
    container.innerHTML = '';
    const categories = ["Animals", "Toys & Collectibles", "Farm Equipment", "Farming Operations"];

    categories.forEach(cat => {
        const sid = cat.replace(/\s/g, '');
        const items = MANIFEST.filter(m => m.cat === cat);
        const section = document.createElement('div');
        
        // COLLAPSED BY DEFAULT: initialize as true if undefined
        if (state.collapsed[sid] === undefined) state.collapsed[sid] = true;
        
        section.className = state.collapsed[sid] ? 'section-collapsed' : '';
        section.innerHTML = `
            <div class="category-header" data-action="toggle-sec" data-sid="${sid}">
                <div class="flex flex-col">
                    <span class="text-[13px] font-black italic uppercase text-white tracking-widest">${cat}</span>
                    <span class="text-[8px] jd-yellow-text uppercase font-black tracking-widest">${items.length} Entries</span>
                </div>
                <span class="category-arrow text-white/50">▼</span>
            </div>
            <div class="section-content grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 pt-2 pb-8">
                ${items.map(t => {
                    const d = pData[t.id] || { count: 0, isEarned: false };
                    const cardPct = Math.floor((d.count/t.goal)*100);
                    return `
                        <div class="fs-card-glass ${d.isEarned ? 'earned' : ''}">
                            <div class="flex justify-between items-center mb-3">
                                <span class="text-[9px] font-black uppercase tracking-widest jd-yellow-text border border-white/10 px-3 py-1 rounded-full">${t.rarity}</span>
                                <span class="text-[11px] font-black italic jd-yellow-text">${cardPct}%</span>
                            </div>
                            <div class="mb-4">
                                <h3 class="text-[16px] font-black italic text-white uppercase leading-tight">${t.title}</h3>
                                ${t.customNote ? `<div class="helper-note">${t.customNote}</div>` : ''}
                            </div>
                            <div class="flex items-center gap-3">
                                ${t.isInc ? `
                                    <button data-action="trophy" data-id="${t.id}" data-delta="-1" class="w-10 h-10 rounded-xl bg-white/5 border border-white/10 font-bold hover:bg-white/10 transition-colors">-</button>
                                    <div class="flex-1 text-center">
                                        <span class="text-xl font-black hw-accent-text">${d.count}</span>
                                        <span class="jd-yellow-text text-[9px] block">of ${t.goal}</span>
                                    </div>
                                    <button data-action="trophy" data-id="${t.id}" data-delta="1" class="w-10 h-10 rounded-xl bg-white/5 border border-white/10 font-bold hover:bg-white/10 transition-colors">+</button>
                                ` : `
                                    <button data-action="trophy" data-id="${t.id}" data-delta="1" class="flex-1 py-3 rounded-xl text-[10px] font-black border uppercase tracking-widest transition-all" 
                                        style="background: ${d.isEarned ? '#22c55e' : 'rgba(255,255,255,0.05)'}; border-color: ${d.isEarned ? '#22c55e' : 'rgba(255,255,255,0.1)'}; color: ${d.isEarned ? '#000' : 'var(--jd-yellow)'}">
                                        ${d.isEarned ? 'Objective Met' : 'Acquire'}
                                    </button>
                                `}
                            </div>
                        </div>
                    `;
                }).join('')}
            </div>
        `;
        container.appendChild(section);
    });
}

init();
</script>
</body>
</html>

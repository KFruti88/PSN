<div id="wp-custom-wrapper">
  <div class="fs22-command-center">
    <!-- Navigation Bar -->
    <nav class="fs-nav">
      <div class="nav-container">
        <div class="branding">
          <div class="icon-box">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="tractor-icon"><path d="m10 11 11 .9c.6 0 .9.5.8 1.1l-.8 5.4c-.1.5-.6.6-1.1.6H11"/><path d="M16 18h-5"/><path d="M10 11 8.8 8H3.2L2 11"/><path d="M2 11v4c0 .6.5 1.1 1.1 1.1h3.4c.5 0 1-.5 1.1-1.1v-4"/><circle cx="18" cy="18" r="2"/><circle cx="5" cy="18" r="2"/><path d="M10 11h11"/></svg>
          </div>
          <div class="title-group">
            <span id="fs-map-display" class="primary-text">ELMCREEK</span>
            <span id="fs-server-display" class="secondary-text">618 CREW FEED ACTIVE</span>
          </div>
        </div>

        <div class="nav-actions">
          <a href="https://discord.gg/nN9eNnwWwx" target="_blank" class="discord-pill">
            <svg class="discord-icon" viewBox="0 0 24 24"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.078.078 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
            <span>Discord</span>

          <div class="status-box">
            <span id="status-dot" class="dot"></span>
            <span id="status-text">OFFLINE</span>
          </div>
        </div>
      </div>
    </nav>

    <main class="fs-content">
      <!-- Top Row: Liquidity & Progress -->
      <div class="stat-grid">
        <div id="liquidity-row" class="liquidity-inner-grid">
           <!-- Cards injected here -->
        </div>
        
        <div class="glass-panel progress-card">
          <p class="stat-label">COLLECTIBLES PROGRESS</p>
          <div class="progress-container">
            <div id="collectible-fill" class="progress-fill" style="width: 0%"></div>
            <span id="collectible-text" class="progress-overlay">0 / 100</span>
          </div>
          <div class="sub-stats">
            <div class="sub-item">GROWTH CYCLE: <span id="fs-growth-index" class="mono">--</span></div>
            <div class="sub-item">CHICAGO: <span id="fs-sync-time" class="mono">--:--</span></div>
          </div>
        </div>
      </div>

      <div class="main-layout-grid">
        <div class="primary-col">
          <div class="glass-panel map-panel">
            <div class="panel-header">
              <h3><span class="icon">🛰️</span> TACTICAL GPS TELEMETRY</h3>
              <div class="map-legend">
                <div class="legend-item"><span class="marker-dot blue"></span> Fleet</div>
                <div class="legend-item"><span class="marker-dot yellow"></span> World</div>
              </div>
            </div>
            
            <div class="map-wrapper" id="fs-map-container">
              <div class="zoom-controls">
                <button id="fs-zoom-in" title="Zoom In">+</button>
                <button id="fs-zoom-out" title="Zoom Out">-</button>
                <button id="fs-zoom-reset" title="Reset View">⟲</button>
              </div>
              <div id="fs-map-viewport">
                <img id="fs-map-img" src="https://placehold.co/512/080808/00f2ff?text=Connecting..." alt="Map Feed">
                <div id="fs-marker-layer"></div>
              </div>
            </div>
          </div>

          <div class="glass-panel">
            <div class="panel-header"><h3><span class="icon">🛠️</span> FLEET MAINTENANCE LEDGER</h3></div>
            <div class="table-scroll">
              <table class="fs-table">
                <thead>
                  <tr><th>ID</th><th>NOMENCLATURE</th><th>FUEL</th><th>DAMAGE</th><th>GPS</th></tr>
                </thead>
                <tbody id="fs-fleet-body"></tbody>
              </table>
            </div>
          </div>
        </div>

        <div class="sidebar-col">
          <div class="glass-panel side-border-blue">
            <div class="panel-header"><h3><span class="icon">👥</span> FIELD PERSONNEL</h3></div>
            <div id="worker-list" class="worker-list"></div>
          </div>

          <div class="glass-panel side-border-green">
            <div class="panel-header"><h3><span class="icon">📈</span> MARKET PRICE WATCH</h3></div>
            <div class="table-scroll max-h-300">
              <table class="market-table">
                <thead><tr><th>CROP</th><th>PRICE</th></tr></thead>
                <tbody id="fs-market-body"></tbody>
              </table>
            </div>
          </div>

          <div class="glass-panel side-border-purple">
            <button id="mod-toggle" class="dropdown-btn">
              <span>MOD MANIFEST</span>
              <span id="mod-count" class="badge">0</span>
              <span class="arrow">▼</span>
            </button>
            <div id="mod-content" class="dropdown-content hidden">
              <ul id="mod-list"></ul>
            </div>
          </div>

          <div class="glass-panel side-border-red">
            <div class="panel-header"><h3><span class="icon">📜</span> OPERATION LOG</h3></div>
            <div id="system-log" class="log-container"></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <style>
    #wp-custom-wrapper {
      --bg-main: #0a0b0d;
      --glass: rgba(20, 24, 28, 0.98);
      --neon-blue: #00f2ff;
      --neon-green: #39ff14;
      --neon-orange: #ff5f00;
      --neon-red: #c41e3a;
      --border: rgba(255, 255, 255, 0.08);
      --font-stack: 'Inter', sans-serif;
    }

    #wp-custom-wrapper .fs22-command-center { background: var(--bg-main); color: #e2e8f0; font-family: var(--font-stack); min-height: 100vh; padding-bottom: 50px; }
    
    #wp-custom-wrapper .fs-nav { background: rgba(0,0,0,0.85); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); padding: 12px 24px; position: sticky; top: 0; z-index: 100; }
    #wp-custom-wrapper .nav-container { max-width: 1600px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
    #wp-custom-wrapper .branding { display: flex; align-items: center; gap: 12px; }
    #wp-custom-wrapper .icon-box { background: var(--neon-green); padding: 8px; border-radius: 12px; color: #000; }
    #wp-custom-wrapper .primary-text { font-weight: 900; font-size: 1.1rem; text-transform: uppercase; line-height: 1; display: block; }
    #wp-custom-wrapper .secondary-text { font-size: 9px; color: var(--neon-green); font-weight: 800; letter-spacing: 2px; text-transform: uppercase; margin-top: 2px; display: block; }
    #wp-custom-wrapper .nav-actions { display: flex; gap: 12px; align-items: center; }
    #wp-custom-wrapper .discord-pill { background: #5865F2; color: #fff; padding: 6px 16px; border-radius: 50px; font-size: 10px; font-weight: 800; display: flex; align-items: center; gap: 8px; text-decoration: none; }
    #wp-custom-wrapper .status-box { display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.05); padding: 5px 12px; border-radius: 20px; font-size: 10px; font-weight: 800; }
    #wp-custom-wrapper .dot { width: 8px; height: 8px; border-radius: 50%; }

    #wp-custom-wrapper .fs-content { max-width: 1600px; margin: 25px auto; padding: 0 20px; }
    #wp-custom-wrapper .stat-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 25px; }
    #wp-custom-wrapper .liquidity-inner-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    #wp-custom-wrapper .main-layout-grid { display: grid; grid-template-columns: 2.2fr 1fr; gap: 25px; }

    #wp-custom-wrapper .glass-panel { background: var(--glass); border: 1px solid var(--border); border-radius: 16px; padding: 20px; position: relative; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
    #wp-custom-wrapper .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
    #wp-custom-wrapper h3 { font-size: 10px; font-weight: 900; letter-spacing: 2px; color: #526071; margin: 0; text-transform: uppercase; }

    #wp-custom-wrapper .map-wrapper { 
        position: relative; 
        width: 100%; 
        max-width: 700px; 
        aspect-ratio: 1/1; 
        margin: 0 auto; 
        background: #000; 
        border-radius: 12px; 
        overflow: hidden; 
        cursor: grab; 
        border: 2.5px solid rgba(0, 242, 255, 0.15); 
    }
    #wp-custom-wrapper #fs-map-viewport { position: absolute; width: 100%; height: 100%; transform-origin: center; transition: transform 0.1s ease-out; }
    #wp-custom-wrapper #fs-map-img { width: 100%; height: 100%; object-fit: cover; image-rendering: crisp-edges; }
    
    #wp-custom-wrapper #fs-marker-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
    #wp-custom-wrapper .fs-marker { position: absolute; transform: translate(-50%, -50%); pointer-events: auto; z-index: 5; }
    #wp-custom-wrapper .fs-marker:hover { z-index: 1000 !important; }
    
    #wp-custom-wrapper .fs-tooltip { 
      position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%); 
      background: #000000; border: 2px solid var(--neon-blue); border-radius: 8px; 
      padding: 14px; width: max-content; min-width: 180px; opacity: 0; 
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); pointer-events: none; 
      box-shadow: 0 20px 50px rgba(0,0,0,1); color: #ffffff; line-height: 1.6; font-size: 12px;
      font-weight: 600;
    }
    #wp-custom-wrapper .fs-marker:hover .fs-tooltip { opacity: 1; transform: translateX(-50%) translateY(-8px); }
    #wp-custom-wrapper .tooltip-title { display: block; border-bottom: 2px solid rgba(0, 242, 255, 0.3); margin-bottom: 8px; padding-bottom: 5px; font-weight: 900; color: var(--neon-blue); text-transform: uppercase; font-size: 13px; }

    #wp-custom-wrapper .zoom-controls { position: absolute; top: 15px; right: 15px; z-index: 20; display: flex; flex-direction: column; gap: 6px; }
    #wp-custom-wrapper .zoom-controls button { width: 34px; height: 34px; background: rgba(0,0,0,0.9); border: 1px solid var(--neon-blue); color: var(--neon-blue); font-weight: 900; cursor: pointer; border-radius: 6px; }
    #wp-custom-wrapper .marker-dot { width: 12px; height: 12px; border-radius: 50%; border: 2px solid #fff; display: inline-block; }
    #wp-custom-wrapper .marker-dot.blue { background: var(--neon-blue); box-shadow: 0 0 12px var(--neon-blue); }
    #wp-custom-wrapper .marker-dot.yellow { background: var(--neon-yellow); box-shadow: 0 0 12px var(--neon-yellow); }

    #wp-custom-wrapper .progress-container { background: rgba(255,255,255,0.05); height: 24px; border-radius: 6px; overflow: hidden; position: relative; margin: 10px 0; border: 1px solid var(--border); }
    #wp-custom-wrapper .progress-fill { background: var(--neon-blue); height: 100%; transition: width 1s ease; box-shadow: 0 0 15px var(--neon-blue); }
    #wp-custom-wrapper .progress-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 900; color: #fff; text-shadow: 0 1px 3px #000; }
    #wp-custom-wrapper .sub-stats { display: flex; justify-content: space-between; font-size: 9px; color: #526071; font-weight: 800; }
    #wp-custom-wrapper .table-scroll { max-height: 400px; overflow-y: auto; }
    #wp-custom-wrapper table { width: 100%; border-collapse: collapse; }
    #wp-custom-wrapper th { text-align: left; font-size: 9px; color: #526071; padding: 12px 8px; border-bottom: 2px solid var(--border); text-transform: uppercase; }
    #wp-custom-wrapper td { padding: 12px 8px; border-bottom: 1px solid var(--border); font-size: 11px; }
    #wp-custom-wrapper .admin-werewolf { color: var(--neon-orange) !important; text-shadow: 0 0 10px var(--neon-orange); font-weight: 900; }
    #wp-custom-wrapper .admin-livid { color: var(--neon-red) !important; text-shadow: 0 0 10px var(--neon-red); font-weight: 900; }
    #wp-custom-wrapper .mono { font-family: monospace; }
    #wp-custom-wrapper .hidden { display: none; }
    #wp-custom-wrapper .badge { background: var(--neon-blue); color: #000; padding: 1px 7px; border-radius: 12px; font-size: 9px; font-weight: 900; }
    #wp-custom-wrapper .dropdown-btn { width: 100%; background: transparent; border: none; color: #e2e8f0; font-weight: 800; font-size: 11px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; text-transform: uppercase; }
    #wp-custom-wrapper .log-container { height: 160px; overflow-y: auto; font-family: monospace; font-size: 10px; color: #718096; line-height: 1.6; }
    #wp-custom-wrapper .worker-list { display: flex; flex-direction: column; gap: 10px; }

    @media (max-width: 1200px) { #wp-custom-wrapper .main-layout-grid, #wp-custom-wrapper .stat-grid, #wp-custom-wrapper .liquidity-inner-grid { grid-template-columns: 1fr; } }
  </style>

  <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-database-compat.js"></script>

  <script>
    (function() {
      const config = { databaseURL: "https://psn-fs22-overlay-default-rtdb.firebaseio.com" };
      if (!firebase.apps.length) { firebase.initializeApp(config, 'fs22StrategicOps'); }
      const db = firebase.app('fs22StrategicOps').database();

      const viewport = document.getElementById('fs-map-viewport');
      const container = document.getElementById('fs-map-container');
      const mapImg = document.getElementById('fs-map-img');
      let scale = 1, posX = 0, posY = 0, isDragging = false, startX, startY;

      document.getElementById('mod-toggle').onclick = () => document.getElementById('mod-content').classList.toggle('hidden');

      function updateTransform() { 
        viewport.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`; 
        scale > 2 ? mapImg.style.imageRendering = 'pixelated' : mapImg.style.imageRendering = 'crisp-edges';
      }

      container.addEventListener('wheel', (e) => { e.preventDefault(); scale = Math.min(Math.max(1, scale * (e.deltaY > 0 ? 0.9 : 1.1)), 10); if(scale===1){posX=0;posY=0;} updateTransform(); }, {passive:false});
      container.addEventListener('mousedown', (e) => { if(scale > 1){ isDragging = true; startX = e.clientX - posX; startY = e.clientY - posY; } });
      window.addEventListener('mousemove', (e) => { if(isDragging){ posX = e.clientX - startX; posY = e.clientY - startY; updateTransform(); } });
      window.addEventListener('mouseup', () => isDragging = false);

      document.getElementById('fs-zoom-in').onclick = () => { scale = Math.min(scale * 1.5, 10); updateTransform(); };
      document.getElementById('fs-zoom-out').onclick = () => { scale = Math.max(scale / 1.5, 1); if(scale===1){posX=0;posY=0;} updateTransform(); };
      document.getElementById('fs-zoom-reset').onclick = () => { scale = 1; posX = 0; posY = 0; updateTransform(); };

      db.ref('fs22_live').on('value', (snap) => {
        const data = snap.val();
        if (!data) return;

        // NEW: Filter out "Ghost" equipment (0/0 stats or 0/0 position)
        const activeFleet = (data.fleet?.vehicles || []).filter(v => {
            const hasNoStats = (v.fuel === 0 && v.damage === 0);
            const isDeadCenter = (v.x === 0 && v.z === 0);
            return !(hasNoStats || isDeadCenter);
        });

        // 1. Dynamic Liquidity
        const liqRow = document.getElementById('liquidity-row');
        if (data.server?.farms) {
          liqRow.innerHTML = data.server.farms.map(f => {
            const isF1 = f.id === "1" || f.name.toLowerCase().includes('werewolf') || f.name.toLowerCase().includes('funny');
            const color = isF1 ? 'var(--neon-orange)' : 'var(--neon-red)';
            const acct = isF1 ? 'WEREWOLF3788' : 'ONELIVIDMAN';
            return `<div class="glass-panel" style="border-top: 4px solid ${color}; padding:15px 25px;">
              <p style="font-size:9px; font-weight:900; color:#526071; letter-spacing:1px; margin:0;">${f.name.toUpperCase()} LIQUIDITY</p>
              <p style="color:${color}; font-size:2.4rem; font-weight:900; letter-spacing:-2px; margin:2px 0; line-height:1;">$${(f.money || 0).toLocaleString()}</p>
              <p style="font-size:9px; font-weight:800; color:#4a5568; margin:0;">ACCOUNT: ${acct}</p>
            </div>`;
          }).join('');
        }

        // 2. Map Markers (Filtered)
        const markerLayer = document.getElementById('fs-marker-layer');
        markerLayer.innerHTML = '';
        const mapSize = data.server?.mapSize || 2048;
        activeFleet.forEach(v => {
            const left = ((v.x / mapSize) + 0.5) * 100, top = ((v.z / mapSize) + 0.5) * 100;
            const marker = document.createElement('div');
            marker.className = 'fs-marker';
            marker.style.left = left + '%'; marker.style.top = top + '%';
            
            const unitName = v.name || v.category || "Service Unit";
            const fillAmt = (v.fillLevel != null) ? v.fillLevel.toLocaleString() : "0";
            const fillType = (v.fillType && v.fillType !== "Empty" && v.fillType !== "UNKNOWN") ? v.fillType : "";
            const statusLine = fillType ? `Fill: ${fillAmt}L ${fillType}` : "Status: Active";

            marker.innerHTML = `
              <div class="marker-dot ${v.type === 'owned' ? 'blue' : 'yellow'}"></div>
              <div class="fs-tooltip">
                <span class="tooltip-title">${unitName}</span>
                <span style="display:block;">${statusLine}</span>
                <span class="mono" style="font-size:9px; color:#526071; margin-top:5px; display:block;">COORD: ${v.x.toFixed(0)} / ${v.z.toFixed(0)}</span>
              </div>`;
            markerLayer.appendChild(marker);
        });

        // 3. Stats & Sync
        const coll = data.collectibles || { found: 0, total: 100 };
        document.getElementById('collectible-fill').style.width = ((coll.found / coll.total) * 100) + '%';
        document.getElementById('collectible-text').innerText = `${coll.found} / ${coll.total} PIECES FOUND`;
        document.getElementById('fs-growth-index').innerText = data.server?.growthCycle || "0";
        document.getElementById('fs-sync-time').innerText = data.lastUpdated || "--:--";
        const isOnline = data.server?.online >= 0;
        document.getElementById('status-dot').className = `dot ${isOnline ? 'bg-green-500' : 'bg-red-500'}`;
        document.getElementById('status-text').innerText = isOnline ? 'LIVE' : 'DOWN';
        document.getElementById('fs-map-display').innerText = data.server?.map || "ELMCREEK";

        if (data.media?.mapUrl) mapImg.src = `https://wsrv.nl/?url=${encodeURIComponent(data.media.mapUrl)}&t=${Date.now()}`;

        // 4. Fleet Ledger (Filtered)
        const fleetBody = document.getElementById('fs-fleet-body');
        fleetBody.innerHTML = activeFleet.map((v, i) => `<tr>
          <td style="color:#4a5568; font-weight:800;">${i+1}</td>
          <td style="font-weight:700;">${v.name || v.category}</td>
          <td style="color:var(--neon-blue); font-weight:700;">${v.fuel || 0}%</td>
          <td style="${(v.damage > 20) ? 'color:var(--neon-red)' : 'color:var(--neon-green)'}">${v.damage || 0}%</td>
          <td class="mono" style="font-size:10px;">${v.x.toFixed(0)} / ${v.z.toFixed(0)}</td>
        </tr>`).join('');

        // 5. Sidebar data
        const workerList = document.getElementById('worker-list');
        workerList.innerHTML = (data.server?.players || []).map(p => {
          let adminClass = p.isAdmin ? (p.name === "werewolf3788" ? "admin-werewolf" : (p.name === "OneLIVIDMAN" ? "admin-livid" : "")) : "";
          return `<div class="flex gap-3 items-center"><span class="${adminClass}" style="font-size:14px;">🚜</span> <span class="${adminClass}" style="font-size:13px; text-transform:uppercase;">${p.name}</span></div>`;
        }).join('') || '<span style="color:#4a5568; font-size:11px;">No personnel active.</span>';

        const marketBody = document.getElementById('fs-market-body');
        if (data.economy) {
          marketBody.innerHTML = data.economy.map(e => `<tr><td style="font-weight:700; font-size:10px;">${e.name}</td><td class="mono">$${e.price.toLocaleString()}</td></tr>`).join('');
        }

        const modCountEl = document.getElementById('mod-count');
        const modListEl = document.getElementById('mod-list');
        if (data.mods) {
          modCountEl.innerText = data.mods.length;
          modListEl.innerHTML = data.mods.map(m => `<li style="font-size:10px; margin-bottom:5px; color:#718096; border-bottom:1px solid rgba(255,255,255,0.03); padding-bottom:3px;">🧩 ${m.replace('.zip','').replace(/_/g,' ').replace('FS22 ','')}</li>`).join('');
        }
      });
    })();
  </script>
</div>

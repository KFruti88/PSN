<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FS22 Ultimate Protocol</title>
    
    <meta name="theme-color" content="#0a0c0e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FS22 Sync">
    <link rel="apple-touch-icon" href="https://static-cdn.jtvnw.net/jtv_user_pictures/1a4efdb4-023e-4802-b07c-82c09a45c4c8-profile_image-70x70.png">

    <link rel="manifest" href="data:application/manifest+json,{'name':'FS22 Ultimate Protocol','short_name':'FS22 Sync','start_url':'.','display':'standalone','background_color':'#0a0c0e','theme_color':'#ffde00'}">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --jd-green: #367c2b;
            --jd-yellow: #ffde00;
        }

        body {
            background-color: #000;
            margin: 0;
            padding: 0;
            overflow-x: hidden; /* Prevent horizontal hang-over */
        }

        #wp-custom-wrapper {
            width: 100% !important;
            max-width: 1400px;
            margin: 0 auto !important;
            color: #f1f5f9 !important;
            font-family: ui-sans-serif, system-ui, sans-serif;
            min-height: 100vh;
            padding: 10px;
            box-sizing: border-box;
        }

        #wp-custom-wrapper .fs22-main-shell {
            border-radius: 2rem;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)), 
                        url('https://encrypted-tbn3.gstatic.com/images?q=tbn:ANd9GcSsAtz--LSRgueGUzqjPk3A4Ry4PY5uhKyIxBH24w451dGUaFMr');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        #wp-custom-wrapper .fs-heavy-glass {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.5rem;
            position: relative;
            z-index: 10;
        }

        #wp-custom-wrapper .fs-card-glass {
            background: rgba(15, 18, 20, 0.95);
            backdrop-filter: blur(10px);
            border: 2px solid var(--fs22-op-color);
            border-radius: 1.5rem;
            transition: transform 0.2s ease;
            position: relative;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        #wp-custom-wrapper .pct-indicator {
            position: absolute;
            top: 1rem;
            right: 1.2rem;
            font-size: 1.4rem;
            font-weight: 900;
            font-style: italic;
            color: var(--jd-yellow);
            text-shadow: 0 0 10px rgba(255, 222, 0, 0.4);
            pointer-events: none;
        }

        #wp-custom-wrapper .fs22-earned-glow {
            box-shadow: 0 0 25px -5px var(--fs22-op-color) !important;
            background: color-mix(in srgb, var(--fs22-op-color) 15%, rgba(10, 12, 14, 0.98)) !important;
        }

        /* Responsive Grid Logic - No hanging over */
        .responsive-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            width: 100%;
        }

        @media (max-width: 640px) {
            .responsive-grid {
                grid-template-columns: 1fr; /* Single column on mobile */
                gap: 1rem;
            }
            #wp-custom-wrapper .fs22-main-shell {
                border-radius: 1rem;
                padding: 1rem !important;
            }
        }

        #wp-custom-wrapper .fs22-btn {
            cursor: pointer;
            transition: all 0.2s ease;
            touch-action: manipulation; /* Faster taps on mobile */
        }

        #wp-custom-wrapper .fs22-btn:active {
            transform: scale(0.95);
        }

        .rarity-tag {
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            padding: 2px 8px;
            border-radius: 6px;
            border: 1px solid;
            background: rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

<div id="wp-custom-wrapper">
    <div id="fs22-app-container" class="fs22-main-shell p-4 md:p-10">
        
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-10 relative z-50">
            <div class="fs-heavy-glass p-6">
                <span class="text-[10px] font-black uppercase tracking-[0.3em] text-white/40 mb-4 block text-center">Operator Select</span>
                <div id="fs22-user-selector" class="flex flex-wrap justify-center gap-3"></div>
            </div>
            <div class="fs-heavy-glass p-6">
                <span class="text-[10px] font-black uppercase tracking-[0.3em] text-white/40 mb-4 block text-center">Hardware Platform</span>
                <div class="flex justify-center gap-4">
                    <button id="btn-PS5" class="fs22-btn px-8 py-3 rounded-xl border-2 font-black text-xs tracking-widest">PS5</button>
                    <button id="btn-PS4" class="fs22-btn px-8 py-3 rounded-xl border-2 font-black text-xs tracking-widest">PS4</button>
                </div>
            </div>
        </div>

        <div id="fs22-platinum-root" class="mb-10 relative z-10"></div>

        <div id="fs22-trophy-grid" class="responsive-grid relative z-10">
            <p class="col-span-full text-center py-20 text-white/50 animate-pulse font-black uppercase tracking-widest">Loading Protocol...</p>
        </div>

        <footer class="mt-20 text-center opacity-30 text-[9px] uppercase tracking-[0.5em] font-black pb-10">
            v8.0 PWA Enabled • Werewolf3788
        </footer>
    </div>
</div>

<script>
// PWA Service Worker Registration
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        const sw = `
            self.addEventListener('install', e => self.skipWaiting());
            self.addEventListener('fetch', e => e.respondWith(fetch(e.request)));
        `;
        const blob = new Blob([sw], {type: 'text/javascript'});
        navigator.serviceWorker.register(URL.createObjectURL(blob));
    });
}

(function() {
    const firebaseConfig = {
        apiKey: "AIzaSyC55Cb3JcK9NiDkdSHpAS3UuTEG82aze7k",
        authDomain: "angler-squad-tracker.firebaseapp.com",
        projectId: "angler-squad-tracker",
        storageBucket: "angler-squad-tracker.firebasestorage.app",
        messagingSenderId: "325679067980",
        appId: "1:325679067980:web:57edbad70fe12b988355e9"
    };

    const appId = 'fs22-master';
    const fsAppName = 'FS22_ULTIMATE_SYNC';
    const app = !firebase.apps.some(a => a.name === fsAppName) ? firebase.initializeApp(firebaseConfig, fsAppName) : firebase.app(fsAppName);
    const db = app.firestore();
    const auth = app.auth();

    const SQUAD = [
        { id: 'Werewolf3788', label: 'Werewolf', theme: '#ff8c00', img: 'https://static-cdn.jtvnw.net/jtv_user_pictures/1a4efdb4-023e-4802-b07c-82c09a45c4c8-profile_image-70x70.png' },
        { id: 'Raymystyro', label: 'Ray', theme: '#c00000', img: 'https://static-cdn.jtvnw.net/jtv_user_pictures/032a0367-589f-4763-94de-4fc679a0b2df-profile_image-70x70.png' },
        { id: 'terrdog420', label: 'TJ', theme: '#004a99', img: 'https://static-cdn.jtvnw.net/jtv_user_pictures/9dad426e-04cb-4fc0-a917-25982b3800ce-profile_image-70x70.png' }
    ];

    const HW_COLORS = { 'PS5': '#367c2b', 'PS4': '#ffde00' };

    const MANIFEST = [
        { id: "road_trip", title: "Road Trip", goal: 100, isInc: true, rarity: "Silver" },
        { id: "plot_thickens", title: "The plot thickens", goal: 100, isInc: true, rarity: "Very Rare" },
        { id: "helper_a", title: "Helper A", goal: 50, isInc: true, step: 1, rarity: "Very Rare" }, 
        { id: "long_haul", title: "Long haul", goal: 50, isInc: true, rarity: "Very Rare" },
        { id: "thoroughbred", title: "Thoroughbred!", goal: 100, isInc: true, rarity: "Very Rare" },
        { id: "vehicle_fleet", title: "Vehicle fleet", goal: 60, isInc: true, rarity: "Rare" },
        { id: "original_grain", title: "Original grain", goal: 50, isInc: true, rarity: "Very Rare" },
        { id: "sow_easy", title: "It's sow easy", goal: 100, isInc: true, rarity: "Very Rare" },
        { id: "large_scale", title: "Large-scale supplier", goal: 100, isInc: true, rarity: "Very Rare" },
        { id: "field_trip", title: "Field Trip", goal: 150, isInc: true, rarity: "Rare" },
        { id: "fix_me_up", title: "Fix me up", goal: 25, isInc: true, rarity: "Very Rare" },
        { id: "fluffiness", title: "Fluffiness", goal: 30, isInc: true, rarity: "Very Rare" },
        { id: "piggies", title: "Three little piggies…", goal: 50, isInc: true, rarity: "Very Rare" },
        { id: "clucky_streak", title: "Clucky Streak", goal: 100, isInc: true, rarity: "Very Rare" },
        { id: "honey", title: "Bringing in the Honey", goal: 15, isInc: true, rarity: "Very Rare" },
        { id: "cowherd", title: "Cowherd", goal: 20, isInc: true, rarity: "Very Rare" },
        { id: "switch_it_up", title: "I like to switch it up", goal: 30, isInc: true, rarity: "Rare" },
        { id: "weekend_vehicle", title: "Weekend vehicle", goal: 45, isInc: true, rarity: "Rare" },
        { id: "cultivated", title: "Highly cultivated", goal: 100, isInc: true, rarity: "Very Rare" },
        { id: "wrap", title: "That's a wrap", goal: 40, isInc: true, rarity: "Very Rare" },
        { id: "cotton", title: "Gone but not for cotton", goal: 40, isInc: true, rarity: "Very Rare" },
        { id: "raisin", title: "Raisin the stakes", goal: 8, isInc: true, rarity: "Very Rare" },
        { id: "olea", title: "Olea europaea", goal: 6, isInc: true, rarity: "Very Rare" },
        { id: "stumped", title: "I'm stumped", goal: 25, isInc: true, rarity: "Rare" },
        { id: "oiled", title: "Well-Oiled Machine", goal: 10, isInc: true, rarity: "Very Rare" },
        { id: "colourful", title: "Pretty colourful", goal: 100, isInc: true, rarity: "Very Rare" },
        { id: "game_on", title: "Game on", goal: 20, isInc: true, rarity: "Very Rare" },
        { id: "cheese_it", title: "Cheese it", goal: 12, isInc: true, rarity: "Very Rare" },
        { id: "beginning", title: "It's just the beginning", goal: 10, isInc: true, rarity: "Rare" },
        { id: "plant_enough", title: "Plant get enough", rarity: "Bronze" },
        { id: "allez_hopp", title: "Allez hopp", rarity: "Bronze" },
        { id: "kangaroo", title: "You are not a kangaroo", rarity: "Very Rare" },
        { id: "giddy_up", title: "Giddy-up!", rarity: "Very Rare" },
        { id: "help_me", title: "Help me to help you", rarity: "Uncommon" },
        { id: "sprinkle", title: "Just a sprinkle", rarity: "Uncommon" },
        { id: "own_use", title: "Own use", rarity: "Uncommon" },
        { id: "van_gogh", title: "van Gogh", rarity: "Rare" },
        { id: "fell_off", title: "It just fell off", rarity: "Rare" },
        { id: "shakespeare", title: "I read Shakespeare", rarity: "Uncommon" },
        { id: "ultimutt", title: "Ultimutt Pawesomeness", rarity: "Rare" },
        { id: "rock_on", title: "Rock on", rarity: "Very Rare" },
        { id: "wood_not", title: "You wood not believe it", rarity: "Uncommon" },
        { id: "hard_work", title: "Hard work pays off", rarity: "Rare" },
        { id: "out_of_land", title: "All out of Land", rarity: "Rare" },
        { id: "never_late", title: "It's never too late to farm", rarity: "Rare" }
    ];

    let currentSel = SQUAD[0];
    let currentPlatform = 'PS5';
    let userData = {};
    let unsub = null;
    let currentUser = null;

    const getProfileRef = (userId) => db.collection('artifacts').doc(appId).collection('public').doc('data').collection('userTrophies').doc(userId);

    window.selectFsUser = (id) => { 
        currentSel = SQUAD.find(u => u.id === id); 
        renderShell(); 
        initSync(); 
    };

    window.setFsPlatform = (p) => { 
        currentPlatform = p; 
        renderShell(); 
        initSync(); 
    };

    window.updFsTrophy = async (trophyId, delta) => {
        if (!currentUser) return;
        const t = MANIFEST.find(m => m.id === trophyId);
        const ref = getProfileRef(currentSel.id);
        const platformData = userData[currentPlatform] || {};
        const cur = platformData[trophyId] || { count: 0, isEarned: false };
        
        const newEntry = {};
        if (t.isInc) {
            const step = t.step || 1;
            const nc = Math.max(0, Math.min(t.goal, (cur.count || 0) + (delta * step)));
            newEntry[trophyId] = { count: nc, isEarned: nc >= t.goal };
        } else {
            newEntry[trophyId] = { isEarned: !cur.isEarned, count: !cur.isEarned ? 1 : 0 };
        }
        
        const payload = {};
        payload[currentPlatform] = newEntry;
        await ref.set(payload, { merge: true });
    };

    function renderShell() {
        const root = document.getElementById('fs22-app-container');
        if (root) {
            root.style.setProperty('--fs22-op-color', currentSel.theme);
            root.style.setProperty('--fs22-hw-color', HW_COLORS[currentPlatform]);
        }

        const selector = document.getElementById('fs22-user-selector');
        if (selector) {
            selector.innerHTML = SQUAD.map(u => {
                const isActive = currentSel.id === u.id;
                return `
                    <button onclick="window.selectFsUser('${u.id}')" class="fs22-btn flex items-center gap-2 p-1 pr-4 rounded-full border-2 ${isActive ? 'op-btn-active' : ''}"
                        style="border-color: transparent; background: ${isActive ? u.theme + '33' : 'rgba(0,0,0,0.4)'}">
                        <img src="${u.img}" class="w-8 h-8 rounded-full" />
                        <span class="text-[10px] font-black uppercase text-white/90">${u.label}</span>
                    </button>
                `;
            }).join('');
        }

        ['PS5', 'PS4'].forEach(p => {
            const btn = document.getElementById(`btn-${p}`);
            if (btn) {
                const isActive = currentPlatform === p;
                const hwColor = HW_COLORS[p];
                btn.onclick = () => window.setFsPlatform(p);
                btn.style.borderColor = isActive ? hwColor : 'rgba(255,255,255,0.08)';
                btn.style.color = isActive ? '#fff' : 'rgba(255,255,255,0.2)';
                btn.style.background = isActive ? hwColor + '22' : 'transparent';
            }
        });
    }

    function initSync() {
        if (!currentUser) return;
        if (unsub) unsub();
        unsub = getProfileRef(currentSel.id).onSnapshot(doc => {
            userData = doc.exists ? doc.data() : {};
            renderAll();
        });
    }

    function renderAll() {
        const grid = document.getElementById('fs22-trophy-grid');
        const pData = userData[currentPlatform] || {};
        const earned = MANIFEST.filter(m => pData[m.id]?.isEarned).length;
        const total = MANIFEST.length;
        const platPct = Math.floor((earned / total) * 100);

        const platRoot = document.getElementById('fs22-platinum-root');
        if (platRoot) {
            platRoot.innerHTML = `
                <div class="fs-heavy-glass p-6 md:p-10 flex flex-col md:flex-row gap-4 items-center border-t-4 transition-all" style="border-top-color: var(--fs22-op-color)">
                    <div class="flex-1 text-center md:text-left">
                        <span class="text-[10px] font-black uppercase tracking-[0.3em] opacity-30">Fleet Readiness</span>
                        <h2 class="text-3xl md:text-5xl font-black italic uppercase text-white">${earned}/${total} COMPLETE</h2>
                    </div>
                    <div class="text-5xl md:text-7xl font-black italic hw-accent-text">${platPct}%</div>
                </div>
            `;
        }

        grid.innerHTML = MANIFEST.map(t => {
            const d = pData[t.id] || { count: 0, isEarned: false };
            const hwColor = HW_COLORS[currentPlatform];
            let displayPct = t.isInc ? (t.id === 'helper_a' ? Math.min(100, d.count * 2) : Math.floor((d.count / t.goal) * 100)) : (d.isEarned ? 100 : 0);

            return `
                <div class="fs-card-glass p-6 ${d.isEarned ? 'fs22-earned-glow' : ''}">
                    <div class="pct-indicator">${displayPct}%</div>
                    <div class="mb-4">
                        <span class="rarity-tag" style="border-color: ${hwColor}; color: ${hwColor}">${t.rarity}</span>
                        <h3 class="text-xl font-black italic uppercase text-white mt-3 leading-tight">${t.title}</h3>
                    </div>
                    <div class="flex items-center gap-3 justify-center">
                        ${t.isInc ? `
                            <button onclick="window.updFsTrophy('${t.id}', -1)" class="fs22-btn w-10 h-10 rounded-lg bg-black/40 border border-white/10">-</button>
                            <span class="text-lg font-black hw-accent-text min-w-[60px] text-center">${d.count}<span class="text-[10px] text-white/20">/${t.goal}</span></span>
                            <button onclick="window.updFsTrophy('${t.id}', 1)" class="fs22-btn w-10 h-10 rounded-lg bg-black/40 border border-white/10">+</button>
                        ` : `
                            <button onclick="window.updFsTrophy('${t.id}', 1)" class="fs22-btn flex-1 py-3 rounded-lg border font-black uppercase text-[10px] tracking-widest" 
                                style="background: ${d.isEarned ? hwColor : 'transparent'}; border-color: ${hwColor}; color: ${d.isEarned ? '#000' : hwColor}">
                                ${d.isEarned ? 'COMPLETED' : 'COLLECT'}
                            </button>
                        `}
                    </div>
                </div>
            `;
        }).join('');
    }

    auth.onAuthStateChanged(user => {
        currentUser = user;
        if (user) { renderShell(); initSync(); }
    });
    auth.signInAnonymously();
})();
</script>
</body>
</html>

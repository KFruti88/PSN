<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raymystyro | Dynamic Profile</title>
    <style>
        :root {
            --fav-red: #8b0000;
            --fav-black: #000000;
            --dynamic-color-1: #333333;
            --dynamic-color-2: #111111;
            --dynamic-glow: 0 0 20px rgba(255, 255, 255, 0.2);
            --glass-overlay: rgba(0, 0, 0, 0.85);
            --border-soft: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at center, var(--fav-red) 0%, var(--fav-black) 100%);
            background-attachment: fixed;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        #wp-custom-wrapper {
            width: 90%;
            max-width: 1400px;
            min-height: 100vh;
            background: transparent;
            padding: 40px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }

        .main-panel {
            background: var(--glass-overlay);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 25px;
            padding: 40px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 40px;
            border: 1px solid var(--border-soft);
            box-sizing: border-box;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.9);
        }

        .sidebar-section {
            border-right: 1px solid var(--border-soft);
            padding-right: 40px;
            text-align: center;
        }

        /* Profile Image Styling */
        .profile-avatar-container {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px auto;
            border-radius: 50%;
            padding: 5px;
            background: linear-gradient(45deg, var(--fav-red), var(--dynamic-color-1));
            box-shadow: var(--dynamic-glow);
            transition: all 0.8s ease;
        }

        .profile-avatar-container img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #000;
        }

        .sidebar-section h1 {
            font-size: 2.5rem;
            color: #ffffff;
            text-transform: uppercase;
            margin: 0 0 20px 0;
        }

        .psn-card-container {
            background: #000;
            padding: 10px;
            border-radius: 15px;
            border: 1px solid #222;
            margin-bottom: 30px;
        }

        .psn-card-container img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            display: block;
        }

        .mobile-games {
            list-style: none;
            padding: 0;
            margin: 0;
            font-size: 0.95rem;
            line-height: 2;
            opacity: 0.8;
        }

        .twitch-cinema-dynamic {
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            border: 3px solid transparent;
            background-image: linear-gradient(#000, #000), linear-gradient(to right, var(--dynamic-color-1), var(--dynamic-color-2));
            background-origin: border-box;
            background-clip: padding-box, border-box;
            box-shadow: var(--dynamic-glow);
            margin-bottom: 30px;
            transition: all 0.8s ease;
        }

        .dynamic-banner {
            background: linear-gradient(90deg, var(--dynamic-color-1) 0%, var(--dynamic-color-2) 100%);
            color: #ffffff;
            padding: 12px 20px;
            font-weight: 800;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
            transition: background 0.8s ease;
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            background: #000;
        }

        .video-container iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
        }

        .button-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 20px;
        }

        .standard-action-btn {
            background: #151515;
            color: #ffffff;
            text-decoration: none;
            padding: 18px;
            border-radius: 12px;
            text-align: center;
            font-weight: 700;
            border: 1px solid #333;
            transition: 0.3s;
            cursor: pointer;
        }

        .standard-action-btn:hover {
            background: #252525;
            transform: translateY(-5px);
        }

        .bio-text {
            margin-top: 30px;
            font-size: 1rem;
            line-height: 1.8;
            opacity: 0.7;
            border-left: 3px solid #ffffff;
            padding-left: 20px;
        }

        @media (max-width: 900px) {
            .main-panel {
                grid-template-columns: 1fr;
                aspect-ratio: auto;
            }
            .sidebar-section { border-right: none; border-bottom: 1px solid var(--border-soft); padding: 0 0 30px 0; margin-bottom: 20px; }
        }
    </style>
</head>
<body>

<div id="wp-custom-wrapper">
    <div class="main-panel">
        
        <div class="sidebar-section">
            <div class="profile-avatar-container">
                <img id="twitch-avatar" src="https://static-cdn.jtvnw.net/jtv_user_pictures/032a0367-589f-4763-94de-4fc679a0b2df-profile_image-70x70.png" alt="Raymystyro">
            </div>

            <h1>Raymystyro</h1>
            <div class="psn-card-container">
                <a href="https://psnprofiles.com/OneLIVIDMAN" target="_blank">
                    <img src="https://card.psnprofiles.com/1/OneLIVIDMAN.png" alt="PSN Profile">
                </a>
            </div>
            <div style="color: #fff; opacity: 0.6; font-size: 0.8rem; letter-spacing: 3px; margin-bottom: 15px;">MOBILE LIBRARY</div>
            <ul class="mobile-games">
                <li>• Infinity Kingdom</li>
                <li>• KingShot</li>
                <li>• Risk</li>
                <li>• Sea of Conquest</li>
            </ul>
        </div>

        <div class="main-content">
            <div class="twitch-cinema-dynamic" id="theme-target">
                <div class="dynamic-banner" id="banner-target">
                    <span id="twitch-status-label">● SYNCING...</span>
                    <span id="twitch-game-label">FETCHING DATA</span>
                </div>
                <div class="video-container">
                    <iframe src="https://player.twitch.tv/?channel=raymystyro&parent=localhost&parent=codepen.io&autoplay=false" 
                            height="100%" width="100%" allowfullscreen></iframe>
                </div>
            </div>

            <div class="button-grid">
                <a href="https://www.twitch.tv/raymystyro" target="_blank" class="standard-action-btn">TWITCH</a>
                <a href="https://discord.gg/HgGmFguxxe" target="_blank" class="standard-action-btn">DISCORD</a>
                <div class="standard-action-btn" onclick="copyGP('DumbAce80', this)">
                    <span id="gp-text">DUMBACE80</span>
                </div>
            </div>

            <div class="bio-text">
                Lead completionist tracking trophies across all platforms.
            </div>
        </div>

    </div>
</div>

<script>
const gameThemes = {
    "Farming Simulator 22": {
        c1: "#228b22", 
        c2: "#d1b06b", 
        glow: "0 0 30px rgba(209, 176, 107, 0.6)"
    },
    "Red Dead Redemption 2": {
        c1: "#b22222", 
        c2: "#000000",
        glow: "0 0 30px rgba(178, 34, 34, 0.6)"
    },
    "default": {
        c1: "#333333",
        c2: "#111111",
        glow: "0 0 20px rgba(255, 255, 255, 0.1)"
    }
};

async function syncDynamicTheme() {
    const user = 'raymystyro';
    try {
        // Sync Game and Colors
        const gameRes = await fetch(`https://decapi.me/twitch/game/${user}`);
        const game = await gameRes.text();
        
        // Sync Profile Avatar
        const avatarRes = await fetch(`https://decapi.me/twitch/avatar/${user}`);
        const avatarUrl = await avatarRes.text();
        
        const statusLabel = document.getElementById('twitch-status-label');
        const gameLabel = document.getElementById('twitch-game-label');
        const avatarImg = document.getElementById('twitch-avatar');
        const root = document.documentElement;

        // Update Avatar
        if (avatarUrl && avatarUrl.includes("http")) {
            avatarImg.src = avatarUrl;
        }

        if (!game.includes("offline") && game !== "") {
            statusLabel.innerText = "● LIVE NOW";
            gameLabel.innerText = game.toUpperCase();

            const theme = gameThemes[game] || gameThemes["default"];
            root.style.setProperty('--dynamic-color-1', theme.c1);
            root.style.setProperty('--dynamic-color-2', theme.c2);
            root.style.setProperty('--dynamic-glow', theme.glow);
        } else {
            statusLabel.innerText = "● OFFLINE";
            gameLabel.innerText = "HUNTING TROPHIES";
            root.style.setProperty('--dynamic-color-1', gameThemes.default.c1);
            root.style.setProperty('--dynamic-color-2', gameThemes.default.c2);
            root.style.setProperty('--dynamic-glow', gameThemes.default.glow);
        }
    } catch (e) {
        console.error("Theme Sync Error");
    }
}

function copyGP(text, el) {
    navigator.clipboard.writeText(text).then(() => {
        const label = document.getElementById('gp-text');
        label.innerText = "COPIED!";
        setTimeout(() => { label.innerText = "DUMBACE80"; }, 2000);
    });
}

syncDynamicTheme();
setInterval(syncDynamicTheme, 60000);
</script>

</body>
</html>

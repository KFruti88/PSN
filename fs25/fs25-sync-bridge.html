<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FS25 Master Sync Bridge</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-green: #76b041;
            --neon-orange: #ff5f00;
            --bg: #0a0b0d;
            --glass: rgba(255, 255, 255, 0.03);
        }
        body {
            background: var(--bg);
            color: #fff;
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-size: 14px;
        }
        .bridge-card {
            width: 90%;
            max-width: 600px;
            background: var(--glass);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 50px 30px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
        }
        h1 {
            font-size: 30px;
            color: var(--neon-blue);
            margin: 0 0 10px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .status-box {
            margin-top: 30px;
            padding: 25px;
            background: #000;
            border-radius: 12px;
            border-left: 4px solid var(--neon-green);
            text-align: left;
            box-shadow: inset 0 0 20px rgba(0,255,0,0.05);
        }
        .log-line {
            margin: 8px 0;
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
        }
        .label { color: #718096; text-transform: uppercase; font-size: 10px; font-weight: 800; }
        .pulse { animation: pulse-green 2s infinite; }
        @keyframes pulse-green {
            0%, 100% { color: var(--neon-green); opacity: 1; }
            50% { color: var(--neon-green); opacity: 0.5; }
        }
    </style>
</head>
<body>

<div class="bridge-card">
    <span class="label" style="color: var(--neon-orange)">618 Crew Precision Uplink</span>
    <h1>FS25 Master Sync</h1>
    <p style="color: #718096; margin-bottom: 30px;">Maintain this connection for live website telemetry.</p>
    
    <div class="status-box">
        <div class="log-line">
            <span class="label">System State</span>
            <span id="bridge-status" class="pulse">● INITIALIZING UPLINK...</span>
        </div>
        <div class="log-line">
            <span class="label">Target Node</span>
            <span style="color:var(--neon-blue)">fs25_live</span>
        </div>
        <div class="log-line">
            <span class="label">Last Heartbeat</span>
            <span id="last-sync-time">--:--:--</span>
        </div>
        <div class="log-line">
            <span class="label">Data Cycles</span>
            <span id="sync-count" style="color: var(--neon-orange)">0</span>
        </div>
    </div>
    
    <p style="font-size: 10px; color: #444; margin-top: 25px; letter-spacing: 1px;">ENCRYPTED FIREBASE CHANNEL ACTIVE</p>
</div>

<script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-database-compat.js"></script>

<script>
(function() {
    const config = { 
        apiKey: "20DTaxhv1O3BsSiCJ5s58GGd0PAjp6DWAqIjsj6R",
        databaseURL: "https://psn-fs22-overlay-default-rtdb.firebaseio.com" 
    };
    if (!firebase.apps.length) firebase.initializeApp(config);
    const db = firebase.database();

    const AUTH = "jeRZKn2jNdgJNqqs";
    const BASE = "http://207.244.243.68:8500/feed/";
    const PROXY = "https://corsproxy.io/?url=";

    const FEEDS = {
        stats: `${BASE}dedicated-server-stats.xml?code=${AUTH}`,
        career: `${BASE}dedicated-server-savegame.html?code=${AUTH}&file=careerSavegame`,
        vehicles: `${BASE}dedicated-server-savegame.html?code=${AUTH}&file=vehicles`,
        economy: `${BASE}dedicated-server-savegame.html?code=${AUTH}&file=economy`
    };

    let syncCount = 0;

    function formatDuration(mins) {
        let h = Math.floor(mins / 60);
        let m = Math.floor(mins % 60);
        return `${h}h ${m}m`;
    }

    async function performMasterSync() {
        try {
            document.getElementById('bridge-status').innerText = "● AGGREGATING FEEDS...";
            
            const [statsRes, careerRes, vehRes, ecoRes] = await Promise.all([
                fetch(PROXY + encodeURIComponent(FEEDS.stats)).then(r => r.text()),
                fetch(PROXY + encodeURIComponent(FEEDS.career)).then(r => r.text()),
                fetch(PROXY + encodeURIComponent(FEEDS.vehicles)).then(r => r.text()),
                fetch(PROXY + encodeURIComponent(FEEDS.economy)).then(r => r.text())
            ]);

            const parser = new DOMParser();
            const sXml = parser.parseFromString(statsRes, "text/xml");
            const sNode = sXml.getElementsByTagName("Server")[0];
            const pNodes = sXml.getElementsByTagName("Player");
            const mNodes = sXml.getElementsByTagName("Mod");
            
            const money = (careerRes.match(/<money>(\d+)<\/money>/) || [0, 0])[1];
            const dayTime = (careerRes.match(/<dayTime>([\d.]+)<\/dayTime>/) || [0, 0])[1];
            const playTime = (careerRes.match(/<playTime>([\d.]+)<\/playTime>/) || [0, 0])[1];
            const mapName = (careerRes.match(/mapName="([^"]+)"/) || [0, "Riverbend Springs"])[1];

            const vXml = parser.parseFromString(vehRes, "text/xml");
            const vNodes = vXml.getElementsByTagName("vehicle");
            const vehicleFleet = [];
            
            for(let v of vNodes) {
                if(!v.getAttribute("x")) continue;
                vehicleFleet.push({
                    name: v.getAttribute("name"),
                    category: v.getAttribute("category"),
                    x: parseFloat(v.getAttribute("x")),
                    z: parseFloat(v.getAttribute("z")),
                    fuel: Math.round(parseFloat(v.getAttribute("fuelLevel") || 0)),
                    damage: Math.round(parseFloat(v.getAttribute("wear") || 0) * 100),
                    farmId: v.getAttribute("farmId"),
                    user: v.getAttribute("user") || "AI"
                });
            }

            const eXml = parser.parseFromString(ecoRes, "text/xml");
            const ecoNodes = eXml.getElementsByTagName("stats");
            const economyData = Array.from(ecoNodes).map(item => ({
                name: item.getAttribute("name") || "Unknown",
                price: Math.round(parseFloat(item.getAttribute("price") || 0))
            }));

            const timestamp = new Date().toLocaleString('en-US', { timeZone: 'America/Chicago' });
            
            const payload = {
                server: {
                    name: sNode ? sNode.getAttribute("name") : "lonewolf and werewolf 618",
                    mapName: mapName,
                    version: sNode ? sNode.getAttribute("version") : "1.0.0.0",
                    money: parseInt(money),
                    dayTime: parseFloat(dayTime),
                    playTime: formatDuration(parseFloat(playTime)),
                    numPlayers: sNode ? parseInt(sNode.getAttribute("numPlayers")) : 0,
                    capacity: 6,
                    mapSize: parseInt(sNode ? sNode.getAttribute("mapSize") || 2048 : 2048)
                },
                players: Array.from(pNodes).map(p => ({
                    name: p.textContent,
                    isUsed: p.getAttribute("isUsed") === "true",
                    isAdmin: p.getAttribute("isAdmin") === "true",
                    uptime: parseInt(p.getAttribute("uptime") || 0),
                    platform: p.getAttribute("platform") || "PC"
                })),
                fleet: {
                    vehicles: vehicleFleet
                },
                economy: economyData,
                mods: Array.from(mNodes).map(m => m.textContent),
                lastUpdate: timestamp
            };

            await db.ref('fs25_live').set(payload);

            syncCount++;
            document.getElementById('sync-count').innerText = syncCount;
            document.getElementById('last-sync-time').innerText = new Date().toLocaleTimeString();
            document.getElementById('bridge-status').innerText = "● UPLINK STABLE";

        } catch (err) {
            console.error("Master Sync Failure:", err);
            document.getElementById('bridge-status').innerText = "⚠ SYNC ERROR - RETRYING...";
        }
    }

    performMasterSync();
    setInterval(performMasterSync, 30000);
})();
</script>
</body>
</html>

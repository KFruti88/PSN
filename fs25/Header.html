<div id="wp-custom-wrapper">
  <div class="fs25-global-header">
    
    <!-- MAIN COMMAND STRIP -->
    <header class="uplink-vitals">
      <div class="vitals-group">
        <span class="label">SIGNAL SOURCE</span>
        <h1 id="srv-name" class="glow-blue">CONNECTING...</h1>
      </div>
      <div class="vitals-group center">
        <span class="label">TACTICAL AREA</span>
        <h2 id="srv-map" class="glow-green">SCANNING...</h2>
      </div>
      <div class="vitals-group right">
        <div class="header-total">
          <span class="label">TOTAL FARM FUNDS</span>
          <span id="header-total-money" class="value glow-orange">$0</span>
        </div>
      </div>
    </header>

    <!-- PERSONNEL ROSTER -->
    <div class="roster-row">
      <div class="roster-header">
        <div class="roster-meta">
          <span class="label">PERSONNEL ONSITE</span>
          <div id="player-count-pill" class="count-pill">0 / 6</div>
        </div>
        <div class="world-meta">
          <span class="label">SYSTEM HEARTBEAT</span>
          <div id="real-clock" class="value-sm mono">00:00:00</div>
        </div>
      </div>
      <div id="player-grid" class="player-grid">
        <!-- Players auto-populate here -->
        <div class="player-slot empty">SEARCHING FOR ACTIVE OPERATORS...</div>
      </div>
    </div>

    <!-- DATA LOGISTICS -->
    <footer class="logistics-bar">
      <div class="log-item">
        <span class="label">DATABASE STATUS</span>
        <span id="sync-status" class="status-indicator">● INITIALIZING</span>
      </div>
      <div class="log-item right">
        <span class="label">LAST UPDATE (CENTRAL)</span>
        <span id="last-update-time" class="mono" style="font-size: 14px;">00:00:00</span>
      </div>
    </footer>

  </div>

  <style>
    #wp-custom-wrapper {
      --glass: rgba(10, 12, 16, 0.95);
      --glass-gloss: linear-gradient(180deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 100%);
      --neon-blue: #00f2ff;
      --neon-green: #76b041;
      --neon-orange: #ff5f00;
      --border: rgba(255, 255, 255, 0.08);
      --font: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    #wp-custom-wrapper .fs25-global-header {
      width: 95%;
      max-width: 1200px;
      margin: 50px auto; /* Divi Section Height Setting: 50 */
      font-family: var(--font);
      color: #fff;
      user-select: none;
    }

    /* Glossy Header Strip (Row Height 30) */
    #wp-custom-wrapper .uplink-vitals {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--glass);
      background-image: var(--glass-gloss);
      padding: 30px 25px; /* Divi Row Height: 30 */
      border: 1px solid var(--border);
      border-radius: 16px 16px 4px 4px;
      border-bottom: 2px solid var(--neon-blue);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      flex-wrap: wrap;
      gap: 20px;
    }

    /* Labels (Body Size 14) */
    #wp-custom-wrapper .label { 
      display: block; 
      font-size: 14px; 
      font-weight: 800; 
      color: #718096; 
      letter-spacing: 2px; 
      text-transform: uppercase;
      margin-bottom: 5px;
    }

    /* Titles (Header Size 30) */
    #wp-custom-wrapper h1, 
    #wp-custom-wrapper h2,
    #wp-custom-wrapper .header-total .value { 
      font-size: 30px; 
      margin: 0; 
      font-weight: 900; 
      text-transform: uppercase; 
      line-height: 1;
    }

    #wp-custom-wrapper .glow-blue { color: var(--neon-blue); text-shadow: 0 0 15px rgba(0, 242, 255, 0.4); }
    #wp-custom-wrapper .glow-green { color: var(--neon-green); text-shadow: 0 0 15px rgba(118, 176, 65, 0.4); }
    #wp-custom-wrapper .glow-orange { color: var(--neon-orange); text-shadow: 0 0 15px rgba(255, 95, 0, 0.4); }

    #wp-custom-wrapper .header-total { text-align: right; }

    /* Personnel Roster Section */
    #wp-custom-wrapper .roster-row {
      background: rgba(15, 17, 22, 0.8);
      backdrop-filter: blur(10px);
      padding: 20px 25px;
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }

    #wp-custom-wrapper .roster-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    #wp-custom-wrapper .count-pill {
      background: rgba(0, 242, 255, 0.1);
      border: 1px solid var(--neon-blue);
      color: var(--neon-blue);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 900;
    }

    #wp-custom-wrapper .player-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px;
    }

    #wp-custom-wrapper .player-slot {
      background: rgba(255,255,255,0.03);
      padding: 12px 15px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.05);
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px; /* Body Size 14 */
      font-weight: 600;
    }

    #wp-custom-wrapper .player-slot.active { background: rgba(118, 176, 65, 0.1); border-color: var(--neon-green); }
    #wp-custom-wrapper .player-slot.empty { opacity: 0.3; font-style: italic; }

    #wp-custom-wrapper .platform-icon {
      font-size: 10px; background: #333; padding: 2px 5px; border-radius: 4px; color: #aaa; font-weight: 800;
    }

    /* Logistics Bar */
    #wp-custom-wrapper .logistics-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--glass);
      padding: 15px 25px;
      border: 1px solid var(--border);
      border-radius: 4px 4px 16px 16px;
      border-top: 1px solid rgba(255,255,255,0.05);
    }

    #wp-custom-wrapper .status-indicator {
      font-size: 12px; font-weight: 900; color: var(--neon-green); animation: pulse 2s infinite;
    }

    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    #wp-custom-wrapper .mono { font-family: monospace; letter-spacing: 1px; }

    @media (max-width: 768px) {
      #wp-custom-wrapper .uplink-vitals { flex-direction: column; text-align: center; }
      #wp-custom-wrapper .vitals-group.right { order: -1; width: 100%; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
      #wp-custom-wrapper .header-total { text-align: center; }
      #wp-custom-wrapper h1, #wp-custom-wrapper h2 { font-size: 24px; }
      #wp-custom-wrapper .player-grid { grid-template-columns: 1fr; }
      #wp-custom-wrapper .logistics-bar { flex-direction: column; gap: 15px; text-align: center; }
    }
  </style>

  <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-database-compat.js"></script>

  <script>
    (function() {
      const config = { 
        apiKey: "20DTaxhv1O3BsSiCJ5s58GGd0PAjp6DWAqIjsj6R",
        databaseURL: "https://psn-fs22-overlay-default-rtdb.firebaseio.com" 
      };

      if (!firebase.apps.length) { firebase.initializeApp(config, 'fs25HeaderUniversal'); }
      const db = firebase.app('fs25HeaderUniversal').database();

      // SMART HELPER: Tries multiple ways to find the same data
      function find(obj, ...keys) {
        if (!obj) return null;
        for (let k of keys) {
            if (obj[k] !== undefined) return obj[k];
        }
        return null;
      }

      db.ref('fs25_live').on('value', (snap) => {
        const data = snap.val();
        if (!data) return;

        // 1. DYNAMIC SERVER INFO
        const overview = find(data, "Server Overview", "server_info", "server") || {};
        document.getElementById('srv-name').innerText = (find(overview, "Server Name", "name", "Server_Name") || "OFFLINE").toUpperCase();
        document.getElementById('srv-map').innerText = (find(overview, "Active Map", "mapName", "map", "Active_Map") || "SCANNING...").toUpperCase();

        // 2. DYNAMIC MONEY AGGREGATION
        let totalCash = 0;
        const farmsNode = find(data, "Farms", "farms", "Farm_Accounts");
        
        if (farmsNode) {
            Object.values(farmsNode).forEach(f => {
                totalCash += parseInt(find(f, "Money", "money", "balance") || 0);
            });
        } else {
            // Fallback if no separate farm nodes exist
            totalCash = parseInt(find(overview, "Money", "money", "Total Funds") || 0);
        }
        document.getElementById('header-total-money').innerText = `$${totalCash.toLocaleString()}`;

        // 3. DYNAMIC PLAYER MAPPING
        const playerGrid = document.getElementById('player-grid');
        playerGrid.innerHTML = '';
        
        const players = find(data, "Online Players", "players", "active_personnel", "active_players") || [];
        const activeCount = players.length;

        players.forEach(p => {
            const name = find(p, "Player Name", "name", "username", "Player_Name") || "Unknown";
            const device = find(p, "Device", "platform", "On_PC_or_Console") || "PC";
            const mins = find(p, "Session Minutes", "uptime", "Time_Played_Mins") || 0;

            playerGrid.innerHTML += `
              <div class="player-slot active">
                <span style="color:var(--neon-green)">●</span>
                <span class="p-name">${name.toUpperCase()}</span>
                <span class="platform-icon">${device}</span>
                <span style="margin-left:auto; font-size:10px; opacity:0.6;">${mins}m</span>
              </div>
            `;
        });

        // Fill vacant slots up to 6
        for (let i = activeCount; i < 6; i++) {
            playerGrid.innerHTML += `<div class="player-slot empty">VACANT SLOT ${i+1}</div>`;
        }

        document.getElementById('player-count-pill').innerText = `${activeCount} / 6`;

        // 4. HEARTBEAT & LOGISTICS
        document.getElementById('real-clock').innerText = new Date().toLocaleTimeString('en-US', { 
            timeZone: 'America/Chicago', hour12: false 
        });
        
        const lastSync = find(data, "Last Update Time", "lastUpdate", "last_heartbeat") || "00:00:00";
        document.getElementById('last-update-time').innerText = lastSync;
        
        const statusInd = document.getElementById('sync-status');
        statusInd.innerText = "● UPLINK ACTIVE";
        statusInd.style.color = "var(--neon-green)";

      }, (error) => {
        console.error("Firebase Sync Error:", error);
        document.getElementById('sync-status').innerText = "⚠ LINK OFFLINE";
        document.getElementById('sync-status').style.color = "var(--neon-orange)";
      });
    })();
  </script>
</div>

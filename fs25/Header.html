<div id="wp-custom-wrapper">
  <div class="fs25-global-header">
    
    <!-- MAIN COMMAND STRIP -->
    <header class="uplink-vitals">
      <div class="vitals-group">
        <span class="label">SIGNAL SOURCE</span>
        <h1 id="srv-name" class="glow-blue">ESTABLISHING...</h1>
      </div>
      <div class="vitals-group center">
        <span class="label">TACTICAL AREA</span>
        <h2 id="srv-map" class="glow-green">SCANNING...</h2>
      </div>
      <div class="vitals-group right">
        <div class="header-total">
          <span class="label">TOTAL FUNDS</span>
          <span id="header-money-val" class="value glow-orange">$0</span>
        </div>
      </div>
    </header>

    <!-- SMART PERSONNEL ROSTER -->
    <div class="roster-row">
      <div class="roster-header">
        <div class="roster-meta">
          <span class="label">PERSONNEL ONSITE</span>
          <div id="player-count-pill" class="count-pill">0 / 6</div>
        </div>
        <div class="world-meta">
          <span class="label">WORLD CLOCK</span>
          <div id="in-game-time" class="value-sm mono">--:--</div>
        </div>
      </div>
      <div id="player-grid" class="player-grid">
        <!-- Players auto-populate here -->
        <div class="player-slot empty">WAITING FOR UPLINK...</div>
      </div>
    </div>

    <!-- MISSION LOGISTICS -->
    <footer class="logistics-bar">
      <div class="log-item">
        <span class="label">MISSION DURATION</span>
        <span id="play-time" class="value-sm">0h 0m</span>
      </div>
      <div class="log-item">
        <span class="label">UPLINK STATUS</span>
        <span id="sync-status" class="status-indicator">● STANDBY</span>
      </div>
      <div class="log-item right">
        <span class="label">CENTRAL SYNC</span>
        <span id="real-clock" class="mono">00:00:00</span>
      </div>
    </footer>

  </div>

  <style>
    #wp-custom-wrapper {
      --glass: rgba(10, 12, 16, 0.95);
      --glass-gloss: linear-gradient(180deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 100%);
      --neon-blue: #00f2ff;
      --neon-green: #76b041;
      --neon-orange: #ff5f00;
      --border: rgba(255, 255, 255, 0.08);
      --font: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    #wp-custom-wrapper .fs25-global-header {
      width: 95%;
      max-width: 1200px;
      margin: 50px auto; /* Divi Section Height Setting: 50 */
      font-family: var(--font);
      color: #fff;
      user-select: none;
    }

    /* Glossy Header Strip */
    #wp-custom-wrapper .uplink-vitals {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--glass);
      background-image: var(--glass-gloss);
      padding: 30px 25px; /* Divi Row Height Setting: 30 */
      border: 1px solid var(--border);
      border-radius: 16px 16px 4px 4px;
      border-bottom: 2px solid var(--neon-blue);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      flex-wrap: wrap;
      gap: 20px;
    }

    #wp-custom-wrapper .label { 
      display: block; 
      font-size: 11px; 
      font-weight: 800; 
      color: #718096; 
      letter-spacing: 2px; 
      text-transform: uppercase;
      margin-bottom: 5px;
    }

    #wp-custom-wrapper h1, 
    #wp-custom-wrapper h2,
    #wp-custom-wrapper .header-total .value { 
      font-size: 30px; /* User Header Setting: 30 */
      margin: 0; 
      font-weight: 900; 
      text-transform: uppercase; 
      line-height: 1;
    }

    #wp-custom-wrapper .glow-blue { color: var(--neon-blue); text-shadow: 0 0 15px rgba(0, 242, 255, 0.4); }
    #wp-custom-wrapper .glow-green { color: var(--neon-green); text-shadow: 0 0 15px rgba(118, 176, 65, 0.4); }
    #wp-custom-wrapper .glow-orange { color: var(--neon-orange); text-shadow: 0 0 15px rgba(255, 95, 0, 0.4); }

    #wp-custom-wrapper .header-total { text-align: right; }

    /* Personnel Roster Section */
    #wp-custom-wrapper .roster-row {
      background: rgba(15, 17, 22, 0.8);
      backdrop-filter: blur(10px);
      padding: 20px 25px;
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }

    #wp-custom-wrapper .roster-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    #wp-custom-wrapper .count-pill {
      background: rgba(0, 242, 255, 0.1);
      border: 1px solid var(--neon-blue);
      color: var(--neon-blue);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 900;
    }

    #wp-custom-wrapper .player-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 10px;
    }

    #wp-custom-wrapper .player-slot {
      background: rgba(255,255,255,0.03);
      padding: 12px 15px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.05);
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px; /* User Body Text Setting: 14 */
      font-weight: 600;
      transition: 0.3s;
    }

    #wp-custom-wrapper .player-slot.active {
      background: rgba(118, 176, 65, 0.1);
      border-color: var(--neon-green);
    }

    #wp-custom-wrapper .player-slot.empty { opacity: 0.3; font-style: italic; }

    #wp-custom-wrapper .platform-icon {
      font-size: 10px;
      background: #333;
      padding: 2px 5px;
      border-radius: 4px;
      color: #aaa;
      font-weight: 800;
    }

    /* Logistics Bar */
    #wp-custom-wrapper .logistics-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--glass);
      padding: 15px 25px;
      border: 1px solid var(--border);
      border-radius: 4px 4px 16px 16px;
      border-top: 1px solid rgba(255,255,255,0.05);
    }

    #wp-custom-wrapper .log-item { display: flex; flex-direction: column; }
    #wp-custom-wrapper .value-sm { font-size: 14px; font-weight: 700; color: #fff; }
    #wp-custom-wrapper .right { text-align: right; }

    #wp-custom-wrapper .status-indicator {
      font-size: 12px;
      font-weight: 900;
      color: var(--neon-green);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.5; }
      100% { opacity: 1; }
    }

    #wp-custom-wrapper .mono { font-family: 'Courier New', Courier, monospace; letter-spacing: 1px; }

    /* Responsive adjustments */
    @media (max-width: 768px) {
      #wp-custom-wrapper .uplink-vitals { flex-direction: column; text-align: center; }
      #wp-custom-wrapper .vitals-group.right { order: -1; width: 100%; border-bottom: 1px solid var(--border); padding-bottom: 15px; text-align: center; }
      #wp-custom-wrapper .header-total { text-align: center; }
      #wp-custom-wrapper h1, #wp-custom-wrapper h2 { font-size: 24px; }
      #wp-custom-wrapper .player-grid { grid-template-columns: 1fr; }
      #wp-custom-wrapper .logistics-bar { flex-direction: column; gap: 15px; text-align: center; }
      #wp-custom-wrapper .log-item.right { text-align: center; }
    }
  </style>

  <!-- Firebase Compat Layer -->
  <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-database-compat.js"></script>

  <script>
    (function() {
      // Firebase Configuration
      const config = { 
        apiKey: "20DTaxhv1O3BsSiCJ5s58GGd0PAjp6DWAqIjsj6R",
        databaseURL: "https://psn-fs22-overlay-default-rtdb.firebaseio.com" 
      };

      const appName = 'fs25HeaderUplink';
      let app;
      try {
        app = firebase.apps.find(a => a.name === appName) || firebase.initializeApp(config, appName);
      } catch (e) {
        app = firebase.app(appName);
      }
      
      const db = app.database();

      function formatFSTime(minutes) {
        if (!minutes) return "00:00";
        let hours = Math.floor(minutes / 60);
        let mins = Math.floor(minutes % 60);
        return `${hours.toString().padStart(2, '0')}:${mins.toString().padStart(2, '0')}`;
      }

      function formatDuration(mins) {
        if (!mins || mins == "0") return "0h 0m";
        let h = Math.floor(mins / 60);
        let m = Math.floor(mins % 60);
        return `${h}h ${m}m`;
      }

      // Live Listener for the FS25 Node
      db.ref('fs25_live').on('value', (snap) => {
        const data = snap.val();
        if (!data) return;

        // 1. Update Server Vitals
        const server = data.server || {};
        document.getElementById('srv-name').innerText = (server.name || "OFFLINE").toUpperCase();
        document.getElementById('srv-map').innerText = (server.mapName || "UNKNOWN").toUpperCase();
        
        // 2. Update Funds (Total in Header)
        const money = server.money || 0;
        document.getElementById('header-money-val').innerText = `$${parseInt(money).toLocaleString()}`;

        // 3. Update In-Game Environment
        document.getElementById('in-game-time').innerText = formatFSTime(parseFloat(server.dayTime || 0));
        document.getElementById('play-time').innerText = formatDuration(parseFloat(server.playTime || 0));

        // 4. Update Personnel Roster (Smart Slots)
        const playerGrid = document.getElementById('player-grid');
        playerGrid.innerHTML = '';
        
        let activeCount = 0;
        // Check if player data exists in the node
        const players = data.players || [];
        const capacity = server.capacity || 6;

        players.forEach(p => {
          if (p && (p.isUsed === true || p.isUsed === "true")) {
            activeCount++;
            playerGrid.innerHTML += `
              <div class="player-slot active">
                <span style="color:var(--neon-green)">●</span>
                <span class="p-name">${p.name}</span>
                <span class="platform-icon">${p.platform || 'PC'}</span>
                <span style="margin-left:auto; font-size:10px; opacity:0.6;">${p.uptime || 0}m</span>
              </div>
            `;
          }
        });

        // Fill vacant slots up to 6
        for (let i = activeCount; i < parseInt(capacity); i++) {
            playerGrid.innerHTML += `<div class="player-slot empty">VACANT SLOT ${i+1}</div>`;
        }

        document.getElementById('player-count-pill').innerText = `${activeCount} / ${capacity}`;

        // Meta Updates
        document.getElementById('real-clock').innerText = new Date().toLocaleTimeString('en-US', { 
            timeZone: 'America/Chicago', hour12: false 
        });
        document.getElementById('sync-status').innerText = "● UPLINK ACTIVE";
        document.getElementById('sync-status').style.color = "var(--neon-green)";

      }, (error) => {
        console.error("Firebase Sync Error:", error);
        document.getElementById('sync-status').innerText = "⚠ UPLINK DISRUPTED";
        document.getElementById('sync-status').style.color = "var(--neon-orange)";
      });
    })();
  </script>
</div>

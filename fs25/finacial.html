<div id="wp-custom-wrapper">
  <div class="fs25-market-terminal">
    
    <!-- TERMINAL HEADER -->
    <header class="terminal-header">
      <div class="branding">
        <span class="label">FINANCIAL INTELLIGENCE [FS25]</span>
        <h1 class="glow-blue">MARKET COMMAND & AUDIT</h1>
      </div>
      <div class="terminal-meta">
        <span class="label">UPLINK STATUS</span>
        <div id="sync-status" class="neon-green">● SECURE CONNECTION</div>
      </div>
    </header>

    <!-- TOP TICKER BAR (Market Summary) -->
    <div class="market-ticker">
      <div class="ticker-wrap" id="top-ticker">
        <span class="ticker-item">INITIALIZING COMMODITY FEED...</span>
      </div>
    </div>

    <!-- MAIN TERMINAL GRID -->
    <div class="terminal-layout">
      
      <!-- LEFT: COMMODITY EXCHANGE -->
      <section class="market-ledger">
        <div class="section-header">
          <span class="label">LIVE EXCHANGE</span>
          <h3>CROP PRICE LEDGER</h3>
        </div>
        <div class="table-scroll">
          <table class="terminal-table">
            <thead>
              <tr>
                <th>COMMODITY</th>
                <th>LIVE PRICE</th>
                <th>YEARLY PEAK</th>
                <th>MOMENTUM</th>
              </tr>
            </thead>
            <tbody id="market-tbody">
              <!-- Auto-populated -->
            </tbody>
          </table>
        </div>
      </section>

      <!-- RIGHT: FARM PORTFOLIOS -->
      <aside class="farm-portfolios">
        <div class="section-header">
          <span class="label">FARM ASSETS</span>
          <h3>LIQUIDITY AUDIT</h3>
        </div>
        <div id="farm-card-container" class="portfolio-list">
          <!-- Auto-populated -->
        </div>
      </aside>

    </div>

    <!-- TERMINAL FOOTER -->
    <footer class="terminal-footer">
      <div class="footer-group">
        <span class="label">TIME SYNC (CENTRAL)</span>
        <span id="terminal-clock" class="mono">00:00:00</span>
      </div>
      <div class="footer-group right-align">
        <span class="label">DATA INTEGRITY</span>
        <span class="mono neon-blue">VERIFIED BY 618 CREW</span>
      </div>
    </footer>
  </div>

  <style>
    #wp-custom-wrapper {
      --bg-terminal: #0a0b0d;
      --bg-card: rgba(15, 17, 22, 0.95);
      --neon-blue: #00f2ff;
      --neon-green: #76b041;
      --neon-orange: #ff5f00;
      --neon-red: #ff3131;
      --border: rgba(255, 255, 255, 0.08);
      --font: 'Inter', -apple-system, system-ui, sans-serif;
    }

    #wp-custom-wrapper .fs25-market-terminal {
      width: 95%;
      margin: 50px auto; /* Section Height: 50 */
      max-width: 1400px;
      font-family: var(--font);
      color: #fff;
    }

    /* Terminal Header: Row Height 30 / Title 30 */
    #wp-custom-wrapper .terminal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--bg-card);
      padding: 30px 25px; /* Row Height: 30 */
      border: 1px solid var(--border);
      border-radius: 12px 12px 0 0;
      border-left: 5px solid var(--neon-blue);
    }

    #wp-custom-wrapper .label { 
      display: block; font-size: 14px; font-weight: 800; color: #718096; 
      letter-spacing: 2px; text-transform: uppercase; margin-bottom: 5px;
    }

    #wp-custom-wrapper h1 { 
      font-size: 30px; font-weight: 900; margin: 0; text-transform: uppercase;
    }

    /* Market Ticker */
    #wp-custom-wrapper .market-ticker {
      background: #000;
      border: 1px solid var(--border);
      border-top: none;
      padding: 10px 20px;
      overflow: hidden;
      white-space: nowrap;
    }
    #wp-custom-wrapper .ticker-item {
      display: inline-block;
      margin-right: 40px;
      font-size: 12px;
      font-weight: 900;
      font-family: monospace;
      color: var(--neon-blue);
    }

    /* Layout Grid */
    #wp-custom-wrapper .terminal-layout {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 2px;
      background: var(--border);
      border: 1px solid var(--border);
    }

    #wp-custom-wrapper .market-ledger, #wp-custom-wrapper .farm-portfolios {
      background: var(--bg-terminal);
      padding: 25px;
    }

    #wp-custom-wrapper .section-header { margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
    #wp-custom-wrapper h3 { font-size: 18px; font-weight: 900; margin: 0; color: #fff; }

    /* Tables */
    #wp-custom-wrapper .terminal-table { width: 100%; border-collapse: collapse; }
    #wp-custom-wrapper th { text-align: left; font-size: 11px; color: #718096; padding: 10px; border-bottom: 1px solid var(--border); }
    #wp-custom-wrapper td { padding: 15px 10px; font-size: 14px; font-weight: 700; border-bottom: 1px solid rgba(255,255,255,0.03); }

    /* Portfolio Cards */
    #wp-custom-wrapper .portfolio-card {
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 15px;
      border-left: 4px solid var(--neon-orange);
    }
    #wp-custom-wrapper .balance-lg { font-size: 24px; font-weight: 900; color: var(--neon-blue); margin: 5px 0; }

    /* Footer */
    #wp-custom-wrapper .terminal-footer {
      display: flex;
      justify-content: space-between;
      background: var(--bg-card);
      padding: 20px 25px;
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 12px 12px;
    }

    /* Utility */
    #wp-custom-wrapper .glow-blue { color: var(--neon-blue); text-shadow: 0 0 10px rgba(0, 242, 255, 0.4); }
    #wp-custom-wrapper .neon-green { color: var(--neon-green); }
    #wp-custom-wrapper .mono { font-family: monospace; font-size: 14px; }
    #wp-custom-wrapper .right-align { text-align: right; }

    @media (max-width: 900px) {
      #wp-custom-wrapper .terminal-layout { grid-template-columns: 1fr; }
      #wp-custom-wrapper .terminal-header { flex-direction: column; text-align: center; gap: 15px; }
      #wp-custom-wrapper .right-align { text-align: center; }
    }
  </style>

  <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-database-compat.js"></script>

  <script>
    (function() {
      const config = { databaseURL: "https://psn-fs22-overlay-default-rtdb.firebaseio.com" };
      if (!firebase.apps.length) { firebase.initializeApp(config, 'fs25MarketTerminal'); }
      const db = firebase.app('fs25MarketTerminal').database();

      // SMART HANDSHAKE: Searches for data regardless of label style
      function find(o, ...keys) { 
        if (!o) return null;
        for (let k of keys) { if (o[k] !== undefined) return o[k]; } 
        return null; 
      }

      const farmDetails = {
        "1": { name: "WEREWOLF OPS", color: "#ff5f00" },
        "2": { name: "RAYMYSTRO OPS", color: "#ff3131" }
      };

      db.ref('fs25_live').on('value', (snap) => {
        const data = snap.val();
        if (!data) return;

        // 1. UPDATE MARKET TICKER & TABLE
        const market = find(data, "Market Prices", "market_prices", "market") || {};
        const tbody = document.getElementById('market-tbody');
        const ticker = document.getElementById('top-ticker');
        
        tbody.innerHTML = '';
        ticker.innerHTML = '';

        Object.keys(market).forEach(crop => {
            const item = market[crop];
            const rawPrice = find(item, "Current Price", "current_price", "Sell_Price") || "$0";
            const rawPeak = find(item, "Best Price This Year", "yearly_peak") || "$0";
            
            // Clean pricing for math
            const priceVal = parseInt(String(rawPrice).replace(/[^0-9]/g, '')) || 0;
            const peakVal = parseInt(String(rawPeak).replace(/[^0-9]/g, '')) || 1;
            const isHot = priceVal >= (peakVal * 0.92);

            // Add to Table
            tbody.innerHTML += `
              <tr>
                <td style="color:var(--neon-blue); font-weight:900;">${crop.replace(/_/g, ' ')}</td>
                <td class="mono">${rawPrice}</td>
                <td class="mono" style="color:#718096">${rawPeak}</td>
                <td>
                  <span style="color:${isHot ? 'var(--neon-green)' : 'var(--neon-orange)'}; font-size:11px; font-weight:900;">
                    ${isHot ? '▲ PEAK MARKET' : '▼ HOLD ASSET'}
                  </span>
                </td>
              </tr>
            `;

            // Add to Ticker
            ticker.innerHTML += `<span class="ticker-item">${crop}: ${rawPrice}</span>`;
        });

        // 2. UPDATE FARM PORTFOLIOS
        const farmContainer = document.getElementById('farm-card-container');
        farmContainer.innerHTML = '';

        const farms = find(data, "Farms", "farms", "Farm Accounts") || {};
        const overview = find(data, "Server Overview", "server") || {};

        // Force Farm 1 if it's missing but server money exists
        const farmsList = {...farms};
        if (!farmsList["1"] && find(overview, "Money", "money")) {
            farmsList["1"] = { "Money": find(overview, "Money", "money") };
        }

        Object.keys(farmsList).sort().forEach(fid => {
            if (fid === "0" || parseInt(fid) > 6) return;
            const farm = farmsList[fid];
            const meta = farmDetails[fid] || { name: `FARM ACCOUNT ${fid}`, color: "#bc13fe" };
            const balance = find(farm, "Money", "money", "balance") || 0;

            farmContainer.innerHTML += `
              <div class="portfolio-card" style="border-left-color:${meta.color}">
                <span class="label" style="color:${meta.color}">${meta.name}</span>
                <div class="balance-lg">$${parseInt(balance).toLocaleString()}</div>
                <div style="font-size:10px; color:#718096; font-weight:900;">LIQUID ASSETS VERIFIED</div>
              </div>
            `;
        });

        // 3. UI EXTRAS
        document.getElementById('terminal-clock').innerText = new Date().toLocaleTimeString('en-US', { 
            timeZone: 'America/Chicago', hour12: false 
        });

      }, (err) => console.error("Market Feed Error:", err));
    })();
  </script>
</div>

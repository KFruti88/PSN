<div id="wp-custom-wrapper">
  <div class="fs25-fleet-dashboard">
    <!-- Header: Divi Header Size 30px applied to values -->
    <header class="vitals-header">
      <div class="vital-item">
        <span class="label">SIGNAL SOURCE [FS25]</span>
        <span id="srv-name" class="value glow-blue">SCANNING...</span>
      </div>
      <div class="vital-item right-align">
        <span class="label">CREW ONSITE</span>
        <span id="srv-players" class="value glow-orange">0 / 6</span>
      </div>
    </header>

    <div class="fleet-grid">
      <!-- F1 Column -->
      <section class="fleet-column border-orange">
        <div class="column-header">
          <h3>🐺 WEREWOLF FLEET (F1)</h3>
        </div>
        <div class="scroll-box">
          <table class="fleet-table">
            <thead>
              <tr><th>UNIT TYPE</th><th>FUEL</th><th>DMG</th></tr>
            </thead>
            <tbody id="f1-fleet-body">
              <tr><td colspan="3" style="text-align:center; opacity:0.5; padding:40px;">Initializing Uplink...</td></tr>
            </tbody>
          </table>
        </div>
      </section>

      <!-- F2 Column -->
      <section class="fleet-column border-red">
        <div class="column-header">
          <h3>⚡ RAYMYSTRO FLEET (F2)</h3>
        </div>
        <div class="scroll-box">
          <table class="fleet-table">
            <thead>
              <tr><th>UNIT TYPE</th><th>FUEL</th><th>DMG</th></tr>
            </thead>
            <tbody id="f2-fleet-body">
              <tr><td colspan="3" style="text-align:center; opacity:0.5; padding:40px;">Initializing Uplink...</td></tr>
            </tbody>
          </table>
        </div>
      </section>
    </div>

    <!-- Footer: Divi Body Size 14px -->
    <footer class="sync-footer">
      <div class="sync-status-group">
        <span class="label">STATUS</span>
        <span id="sync-status">UPLINK STABLE</span>
      </div>
      <div class="sync-status-group right-align">
        <span class="label">CENTRAL TIME</span>
        <span id="sync-time" class="mono">00:00:00</span>
      </div>
    </footer>
  </div>

  <style>
    #wp-custom-wrapper {
      --bg: rgba(10, 11, 13, 0.98);
      --neon-blue: #00f2ff;
      --neon-orange: #ff5f00;
      --neon-red: #ff3131;
      --border: rgba(255, 255, 255, 0.1);
      --font: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    #wp-custom-wrapper .fs25-fleet-dashboard {
      width: 90%;
      margin: 50px auto; /* Divi Section Height: 50 */
      max-width: 1200px;
      font-family: var(--font);
      color: #fff;
    }

    /* Vitals Header */
    #wp-custom-wrapper .vitals-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 30px; /* Divi Row Height: 30 */
      background: var(--bg);
      padding: 30px 20px; /* Divi Row Height: 30 */
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 30px; /* Divi Row Height: 30 */
      border-left: 4px solid var(--neon-blue);
    }

    /* User Body Text Setting: 14px */
    #wp-custom-wrapper .label { 
      display: block; 
      font-size: 14px; 
      font-weight: 800; 
      color: #718096; 
      letter-spacing: 2px; 
      text-transform: uppercase; 
    }

    /* User Header Text Setting: 30px */
    #wp-custom-wrapper .value { 
      font-size: 30px; 
      font-weight: 900; 
      text-transform: uppercase; 
    }

    #wp-custom-wrapper .right-align { text-align: right; }

    /* Layout Grid */
    #wp-custom-wrapper .fleet-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px; /* Divi Row Height: 30 */
    }

    #wp-custom-wrapper .fleet-column {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    #wp-custom-wrapper .border-orange { border-top: 4px solid var(--neon-orange); }
    #wp-custom-wrapper .border-red { border-top: 4px solid var(--neon-red); }

    #wp-custom-wrapper .column-header {
      padding: 15px 20px;
      background: rgba(255,255,255,0.03);
      border-bottom: 1px solid var(--border);
    }
    #wp-custom-wrapper .column-header h3 { margin: 0; font-size: 16px; font-weight: 900; letter-spacing: 1px; }

    /* Table Styling: Body Text 14px */
    #wp-custom-wrapper .fleet-table { width: 100%; border-collapse: collapse; font-size: 14px; }
    #wp-custom-wrapper th { text-align: left; padding: 12px 20px; color: #718096; font-size: 12px; font-weight: 900; border-bottom: 1px solid var(--border); }
    #wp-custom-wrapper td { padding: 14px 20px; border-bottom: 1px solid rgba(255,255,255,0.03); }
    
    #wp-custom-wrapper .scroll-box { 
      max-height: 500px; 
      overflow-y: auto; 
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    /* Glows */
    #wp-custom-wrapper .glow-blue { color: var(--neon-blue); text-shadow: 0 0 10px rgba(0, 242, 255, 0.4); }
    #wp-custom-wrapper .glow-orange { color: var(--neon-orange); text-shadow: 0 0 10px rgba(255, 95, 0, 0.4); }
    #wp-custom-wrapper .glow-red { color: var(--neon-red); text-shadow: 0 0 10px rgba(255, 49, 49, 0.4); }

    /* Footer */
    #wp-custom-wrapper .sync-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 30px; /* Divi Row Height: 30 */
      padding: 15px 20px;
      background: var(--bg);
      border-radius: 8px;
      border: 1px solid var(--border);
    }
    #wp-custom-wrapper .mono { font-family: monospace; letter-spacing: 1px; font-size: 14px; color: #fff; }

    /* Responsive */
    @media (max-width: 1024px) {
      #wp-custom-wrapper .fleet-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 600px) {
      #wp-custom-wrapper .vitals-header { flex-direction: column; align-items: flex-start; padding: 20px; }
      #wp-custom-wrapper .vitals-header .right-align { text-align: left; width: 100%; border-top: 1px solid var(--border); padding-top: 15px; }
      #wp-custom-wrapper .sync-footer { flex-direction: column; align-items: flex-start; }
      #wp-custom-wrapper .value { font-size: 24px; }
    }
  </style>

  <script>
    (function() {
      const AUTH_CODE = "jeRZKn2jNdgJNqqs";
      const PROXY = "https://corsproxy.io/?url=";
      const STATS_URL = `${PROXY}${encodeURIComponent('http://207.244.243.68:8500/feed/dedicated-server-stats.xml?code=' + AUTH_CODE)}`;
      const VEHICLE_URL = `${PROXY}${encodeURIComponent('http://207.244.243.68:8500/feed/dedicated-server-savegame.html?code=' + AUTH_CODE + '&file=vehicles')}`;

      function getFriendlyName(v) {
        const name = (v.getAttribute("name") || "Unit").toUpperCase();
        const category = (v.getAttribute("category") || "").toUpperCase();
        
        if (category.includes("TRACTORSM")) return "Medium Tractor";
        if (category.includes("TRACTORSL")) return "Large Tractor";
        if (category.includes("HARVESTERS")) return "Harvester";
        if (category.includes("CARS")) return "Service Vehicle";
        if (category.includes("TRAINS")) return "Locomotive";
        return name;
      }

      async function refreshFleetUplink() {
        try {
          // 1. Fetch Server Vitals
          const statsRes = await fetch(STATS_URL);
          const statsText = await statsRes.text();
          const statsXml = new DOMParser().parseFromString(statsText, "text/xml");
          const server = statsXml.getElementsByTagName("Server")[0];

          if (server) {
            document.getElementById('srv-name').innerText = server.getAttribute("name").toUpperCase();
            document.getElementById('srv-players').innerText = `${server.getAttribute("numPlayers")} / 6`;
          }

          // 2. Fetch Vehicle Fleet (Using the Savegame XML link provided)
          const vehRes = await fetch(VEHICLE_URL);
          const vehText = await vehRes.text();
          const vehXml = new DOMParser().parseFromString(vehText, "text/xml");
          const vehicles = vehXml.getElementsByTagName("vehicle");

          const f1Body = document.getElementById('f1-fleet-body');
          const f2Body = document.getElementById('f2-fleet-body');
          f1Body.innerHTML = '';
          f2Body.innerHTML = '';

          let f1Count = 0;
          let f2Count = 0;

          for (let v of vehicles) {
            const category = (v.getAttribute("category") || "").toUpperCase();
            // Skip implements/trailers to keep list clean, focus on motorized
            if (category.includes("TRAILER") || category.includes("WEIGHTS") || category.includes("TRAIN")) continue;

            const name = v.getAttribute("name");
            const fuel = Math.round(parseFloat(v.getAttribute("fuelLevel") || 0));
            const wear = Math.round(parseFloat(v.getAttribute("wear") || 0) * 100);
            const farmId = v.getAttribute("farmId");

            const row = `
              <tr>
                <td style="font-weight:700">${getFriendlyName(v)} <br><small style="opacity:0.4; font-size:10px;">${name}</small></td>
                <td style="color:var(--neon-blue)">${fuel}%</td>
                <td style="${wear > 25 ? 'color:var(--neon-red)' : ''}">${wear}%</td>
              </tr>
            `;

            if (farmId == "2") {
              f2Body.innerHTML += row;
              f2Count++;
            } else {
              f1Body.innerHTML += row;
              f1Count++;
            }
          }

          if (f1Count === 0) f1Body.innerHTML = '<tr><td colspan="3" style="text-align:center; opacity:0.5; padding:40px;">No Heavy Units Detected</td></tr>';
          if (f2Count === 0) f2Body.innerHTML = '<tr><td colspan="3" style="text-align:center; opacity:0.5; padding:40px;">No Heavy Units Detected</td></tr>';

          // 3. Update Meta
          const ctTime = new Intl.DateTimeFormat('en-US', {
              timeZone: 'America/Chicago',
              hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
          }).format(new Date());
          document.getElementById('sync-time').innerText = ctTime;
          document.getElementById('sync-status').innerText = "UPLINK STABLE";
          document.getElementById('sync-status').style.color = "var(--neon-blue)";

        } catch (err) {
          console.error("Fleet Sync Error:", err);
          document.getElementById('sync-status').innerText = "SIGNAL DISRUPTED";
          document.getElementById('sync-status').style.color = "var(--neon-red)";
        }
      }

      refreshFleetUplink();
      setInterval(refreshFleetUplink, 30000);
    })();
  </script>
</div>

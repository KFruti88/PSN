name: Sync PSN Trophies to Firebase
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  sync:
    runs-on: ubuntu-latest
    # This tells the runner that all commands happen inside your subfolder
    defaults:
      run:
        working-directory: ./rss-to-firebase

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Run Sync Script
        env:
          FIREBASE_CONFIG: ${{ secrets.FIREBASE_CONFIG }}
        # Since we are already in the folder, we just call the filename
        run: node sync-trophies.js

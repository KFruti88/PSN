name: Sync PSN Trophies to Firebase
on:
  schedule:
    - cron: '*/30 * * * *' # Runs every 30 minutes
  workflow_dispatch: # Allows you to run it manually from GitHub
  push:
    branches: [ main ]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          # This automatically looks for package-lock.json in your subfolder
          cache-dependency-path: ./rss-to-firebase/package-lock.json

      - name: Install Dependencies
        working-directory: ./rss-to-firebase
        run: npm install

      - name: Run Sync Script
        working-directory: ./rss-to-firebase
        env:
          FIREBASE_CONFIG: ${{ secrets.FIREBASE_CONFIG }}
        run: node sync-trophies.js

name: Sync PSN Trophies to Firebase
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # Removed the cache lines to prevent the 'paths not resolved' error

      - name: Install Dependencies
        working-directory: ./rss-to-firebase
        run: npm install

      - name: Run Sync Script
        working-directory: ./rss-to-firebase
        env:
          FIREBASE_CONFIG: ${{ secrets.FIREBASE_CONFIG }}
        run: node sync-trophies.js

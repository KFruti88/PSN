name: Sync PSN Trophies to Firebase
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        # REMOVE 'working-directory' if your files are in the main folder
        # Or ensure this folder exists in your GitHub repo
        working-directory: ./rss-to-firebase
        run: npm install

      - name: Run Sync Script
        working-directory: ./rss-to-firebase
        env:
          FIREBASE_CONFIG: ${{ secrets.FIREBASE_CONFIG }}
        run: node sync-trophies.js

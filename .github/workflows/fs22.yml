name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4 # Ensure this is the latest minor version

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24' # Move to Node 24 now to avoid the June 2nd cutoff

      # FIX: Use upload-pages-artifact instead of upload-artifact
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # If your files are in a specific folder (like 'dist' or 'build'), change '.' to that folder
          path: '.' 

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

# Save as: .github/workflows/fs22.yml
name: FS22 G-Portal Sync

on:
  schedule:
    - cron: '*/10 * * * *' # Runs every 10 minutes
  workflow_dispatch:      # Lets you trigger it manually for testing

jobs:
  build:
    runs-with: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        # We need these three to talk to G-Portal and Firebase
        run: npm install firebase-admin axios xml2js

      - name: Run Sync Script
        # Pointing to your specific folder path
        run: node fs22/sync.js
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

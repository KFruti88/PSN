name: G-Portal to Firebase Universal Sync

on:
  schedule:
    # Runs every 16 minutes to stay 1 minute behind the 15-min autosave
    - cron: '*/16 * * * *' 
  workflow_dispatch: # Allows you to click "Run workflow" manually for testing

jobs:
  sync_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📂 Checkout Repository
        uses: actions/checkout@v4

      - name: 📁 Create Local Workspace
        run: mkdir -p ./server_data

      - name: 🛰️ FTP Pull from G-Portal
        uses: sebastianpopp/git-ftp-action@releases/v3
        with:
          url: "ftp://${{ secrets.GPORTAL_HOST }}"
          user: ${{ secrets.GPORTAL_USER }}
          password: ${{ secrets.GPORTAL_PWD }}
          # -R /profile/ ensures we grab every savegame and the stats XML
          options: "--syncroot ./server_data/ -R /profile/" 

      - name: 🚀 Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}'
          projectId: psn-fs22-overlay
          channelId: live

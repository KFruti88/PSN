name: G-Portal to Firebase Universal Sync

on:
  schedule:
    - cron: '*/16 * * * *' 
  workflow_dispatch: 

jobs:
  sync_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create Local Workspace
        run: mkdir -p ./server_data

      - name: 🛰️ Sync G-Portal Files (Custom Port)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.GPORTAL_HOST }}
          username: ${{ secrets.GPORTAL_USER }}
          password: ${{ secrets.GPORTAL_PWD }}
          port: 50441
          protocol: ftp
          server-dir: /profile/
          local-dir: ./server_data/
          # This tells it to fetch files from the server to GitHub
          dry-run: false
          dangerous-clean-slate: false

      - name: 🚀 Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}'
          projectId: psn-fs22-overlay
          channelId: live

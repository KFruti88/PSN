name: G-Portal to Firebase Universal Sync

on:
  schedule:
    - cron: '*/16 * * * *' 
  workflow_dispatch: 

jobs:
  sync_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install LFTP
        run: sudo apt-get install -y lftp

      - name: 🛰️ Direct File Pull
        run: |
          mkdir -p ./server_data/savegame1
          # The '|| true' at the end of each line prevents the whole script from crashing if one file isn't found
          lftp -c "set ftp:ssl-allow no; 
          open -u ${{ secrets.GPORTAL_USER }},${{ secrets.GPORTAL_PWD }} -p 50441 ${{ secrets.GPORTAL_HOST }}; 
          get /profile/savegame1/vehicles.xml -o ./server_data/savegame1/vehicles.xml || true;
          get /profile/savegame1/careerSavegame.xml -o ./server_data/savegame1/careerSavegame.xml || true;
          get /profile/savegame1/farms.xml -o ./server_data/savegame1/farms.xml || true;
          get /profile/dedicated_server/dedicatedServerStats.xml -o ./server_data/dedicated-server-stats.xml || true"

      - name: 🚀 Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}'
          projectId: psn-fs22-overlay
          channelId: live
          entryPoint: .

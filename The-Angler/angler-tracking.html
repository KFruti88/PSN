<div id="wp-custom-wrapper">
    <div class="bg-grid-angler p-6 md:p-12 border border-sky-900/30 shadow-2xl mt-10">
        <header class="text-center mb-12">
            <h1 class="text-4xl md:text-6xl font-black text-transparent bg-clip-text bg-gradient-to-br from-sky-400 via-blue-500 to-cyan-600 tracking-tighter mb-4 uppercase italic">The Angler: Active Hub</h1>
            <div class="flex flex-wrap justify-center gap-4">
                <a href="https://www.amazon.com/s?k=fishing&tag=psngaming-20" target="_blank" class="px-8 py-3 bg-sky-900/20 border border-sky-500/30 rounded-2xl text-[10px] font-black tracking-widest text-sky-400 uppercase shadow-xl hover:bg-sky-900/40 transition-all">Shop Fishing Gear</a>
            </div>
        </header>

        <div id="angler-player-grid" class="grid grid-cols-1 md:grid-cols-3 gap-8">
            </div>

        <footer class="mt-16 text-center border-t border-sky-900/20 pt-8">
            <p class="text-[10px] text-slate-500 uppercase tracking-[0.4em] font-bold">
                Lead Dev: Werewolf3788 • Active Angler Sync
            </p>
        </footer>
    </div>
</div>

<style>
    #wp-custom-wrapper { background: transparent !important; width: 90%; margin: 0 auto; min-height: 100vh; font-family: ui-sans-serif, system-ui, sans-serif; color: white; }
    .bg-grid-angler { background-color: #020617; background-image: radial-gradient(circle at 2px 2px, #0ea5e9 1px, transparent 0); background-size: 24px 24px; border-radius: 2rem; }
    .legendary-active { box-shadow: 0 0 20px rgba(168, 85, 247, 0.5); animation: pulse-purple-angler 2s infinite ease-in-out; border-color: rgba(168, 85, 247, 0.6) !important; }
    @keyframes pulse-purple-angler { 0%, 100% { box-shadow: 0 0 15px rgba(168, 85, 247, 0.3); } 50% { box-shadow: 0 0 30px rgba(168, 85, 247, 0.7); } }
    @media (max-width: 768px) { .angler-player-card { aspect-ratio: 1 / 1; display: flex; flex-direction: column; justify-content: center; margin-bottom: 1.5rem; } }
</style>

<script>
(function() {
    const anglerConfig = {
        apiKey: "AIzaSyC55Cb3JcK9NiDkdSHpAS3UuTEG82aze7k",
        authDomain: "angler-squad-tracker.firebaseapp.com",
        projectId: "angler-squad-tracker",
        storageBucket: "angler-squad-tracker.firebasestorage.app",
        messagingSenderId: "325679067980",
        appId: "1:325679067980:web:57edbad70fe12b988355e9"
    };

    let anglerApp = !firebase.apps.length ? firebase.initializeApp(anglerConfig) : (firebase.apps.find(app => app.name === 'anglerInstance') || firebase.initializeApp(anglerConfig, "anglerInstance"));
    const anglerDb = anglerApp.firestore();
    
    // Deep path to userTrophies
    const trophyCol = anglerDb.collection('artifacts').doc('theangler-trophy-display').collection('public').doc('data').collection('userTrophies');

    const ACTIVE_PLAYERS = [
        { id: 'Werewolf3788', name: 'Werewolf3788', aliases: 'Lead Developer', img: 'https://static-cdn.jtvnw.net/jtv_user_pictures/1a4efdb4-023e-4802-b07c-82c09a45c4c8-profile_image-70x70.png' },
        { id: 'terrdog420', name: 'terrdog420', aliases: 'DarkWing Dog', img: 'https://static-cdn.jtvnw.net/jtv_user_pictures/9dad426e-04cb-4fc0-a917-25982b3800ce-profile_image-70x70.png' },
        { id: 'Raymystyro', name: 'Raymystyro', aliases: 'lonewolf, speedray', img: 'https://static-cdn.jtvnw.net/jtv_user_pictures/032a0367-589f-4763-94de-4fc679a0b2df-profile_image-70x70.png' }
    ];

    const ANGLER_TIERS = [
        { id: 'legendary', label: 'Legendary', color: 'text-purple-400' },
        { id: 'diamond', label: 'Diamond', color: 'text-cyan-300' },
        { id: 'gold', label: 'Gold', color: 'text-yellow-400' },
        { id: 'silver', label: 'Silver', color: 'text-slate-300' },
        { id: 'bronze', label: 'Bronze', color: 'text-orange-600' }
    ];

    let anglerTrophyData = {};

    function renderActive() {
        const grid = document.getElementById('angler-player-grid');
        grid.innerHTML = ACTIVE_PLAYERS.map(p => {
            const data = anglerTrophyData[p.id] || {};
            return `
            <div class="angler-player-card bg-slate-950/90 rounded-3xl p-6 border border-sky-900 shadow-2xl backdrop-blur-md">
                <div class="flex items-center gap-4 mb-6">
                    <img src="${p.img}" class="w-16 h-16 rounded-full border-2 border-sky-500 object-cover shadow-lg" />
                    <div>
                        <h2 class="text-xl font-black text-white uppercase tracking-tighter leading-none">${p.name}</h2>
                        <p class="text-[9px] text-sky-400 uppercase tracking-widest mt-1">${p.aliases}</p>
                    </div>
                </div>
                <div class="space-y-2.5">
                    ${ANGLER_TIERS.map(t => {
                        const count = data[t.id] || 0;
                        return `
                        <div class="flex items-center justify-between bg-black/50 p-3 rounded-2xl border border-white/5 ${t.id === 'legendary' && count > 0 ? 'legendary-active' : ''}">
                            <span class="font-black text-[10px] ${t.color} uppercase tracking-widest">${t.label}</span>
                            <div class="flex items-center gap-4">
                                <button onclick="window.updateAngler('${p.id}', '${t.id}', -1)" class="w-8 h-8 bg-slate-800 hover:bg-red-600/30 rounded-lg transition-all text-white font-bold">-</button>
                                <span class="text-xl font-mono font-black text-white w-[1.5ch] text-center">${count}</span>
                                <button onclick="window.updateAngler('${p.id}', '${t.id}', 1)" class="w-8 h-8 bg-slate-800 hover:bg-sky-600/30 rounded-lg transition-all text-white font-bold">+</button>
                            </div>
                        </div>`;
                    }).join('')}
                </div>
            </div>`;
        }).join('');
    }

    window.updateAngler = async (playerId, tier, delta) => {
        const docRef = trophyCol.doc(playerId);
        const snap = await docRef.get();
        const current = (snap.exists && snap.data()[tier]) || 0;
        await docRef.set({ [tier]: Math.max(0, current + delta) }, { merge: true });
    };

    anglerApp.auth().signInAnonymously().then(() => {
        trophyCol.onSnapshot(snap => {
            snap.forEach(doc => { anglerTrophyData[doc.id] = doc.data(); });
            renderActive();
        });
    });
})();
</script>
